apiVersion: v2
name: inference-operators
description: Operators for LLM inference platform (CNPG, Envoy Gateway, optional Knative)
type: application
version: 0.9.0
appVersion: "1.0.0"
home: https://github.com/eric-zadara/helm_charts
sources:
  - https://github.com/eric-zadara/helm_charts
maintainers:
  - name: eric-zadara
    url: https://github.com/eric-zadara
annotations:
  testing/tier: "3"
  testing/prerequisites: "inference-crds"
  testing/timeout: "15m"

dependencies:
  - name: cert-manager
    version: "v1.19.3"
    repository: "oci://quay.io/jetstack/charts"
    condition: cert-manager.enabled
  - name: cloudnative-pg
    version: "0.27.1"
    repository: "oci://ghcr.io/cloudnative-pg/charts"
    condition: cloudnative-pg.enabled
  - name: knative-operator
    version: "v1.21.0"
    repository: "https://knative.github.io/operator"
    condition: knative-operator.enabled
  - name: gateway-helm
    version: "v1.7.0"
    repository: "oci://docker.io/envoyproxy"
    alias: envoy-gateway
    condition: envoy-gateway.enabled
  - name: gpu-operator
    version: "v25.10.1"
    repository: "https://helm.ngc.nvidia.com/nvidia"
    condition: gpu-operator.enabled
  - name: opensearch-operator
    version: "3.0.2"
    repository: "https://opensearch-project.github.io/opensearch-k8s-operator"
    condition: opensearch-operator.enabled
