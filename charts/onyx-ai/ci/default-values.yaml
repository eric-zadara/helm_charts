# CI test values for onyx-ai chart
#
# Tests the batteries-included deployment with internal CNPG cluster and Valkey.
# Requires operators to be installed (testing/prerequisites annotation):
#   - CNPG operator (for PostgreSQL)
#   - OpenSearch operator (for OpenSearch cluster)
#
# Release name in CI: "onyx-ai" (helm install "$chart_name" ...)
#
# This configures minimal resources for CI while still deploying real pods:
#   - CNPG PostgreSQL: 1 instance + minimal pooler (rendering coverage)
#   - Valkey: 1 replica (standalone mode, no operator needed)
#   - Object storage: GarageFS built-in (no external S3 needed)
#   - API/Web: 1 replica each
#   - OpenSearch: operator-managed single-node cluster (bundled opensearch disabled)
#   - Celery workers: 1 replica each with minimal resources
#
# Model servers included with minimal resources (replicaCount: 1):
#   - inferenceCapability and indexCapability are deployed but will not finish
#     downloading multi-GB ML models within CI timeout. They are included for
#     template rendering coverage; CI tests should not depend on them becoming Ready.

# ------------------------------------------------------------------------------
# Redis/Valkey - enabled for CI (Bitnami Valkey, no operator required)
# ------------------------------------------------------------------------------
redis:
  enabled: true

# ------------------------------------------------------------------------------
# Object Storage - use built-in GarageFS (no external S3 needed)
# ------------------------------------------------------------------------------
garage:
  enabled: true

# Ingress not needed for CI
ingress:
  enabled: false

# ------------------------------------------------------------------------------
# CNPG Cluster subchart - minimal for CI
# ------------------------------------------------------------------------------
postgresql-cluster:
  enabled: true
  cluster:
    instances: 1
    storage:
      size: 1Gi
    resources: {}
    enableSuperuserAccess: true
    postgresql:
      parameters:
        max_connections: "100"
        idle_in_transaction_session_timeout: "60000"
  # CI uses a minimal pooler (1 instance) to exercise the rendering path.
  # Real prod defaults (2 instances, 2000 max_client_conn) come from values.yaml.
  poolers:
    - name: rw
      type: rw
      poolMode: session
      instances: 1
      parameters:
        default_pool_size: "10"
        max_client_conn: "100"
      monitoring:
        enabled: false
        podMonitor:
          enabled: false
      template:
        spec:
          containers:
            - name: pgbouncer
              resources:
                requests:
                  cpu: 50m
                  memory: 32Mi
                limits:
                  memory: 128Mi
  backups:
    enabled: false

# ------------------------------------------------------------------------------
# Valkey subchart (valkey-io/valkey-helm) - minimal standalone for CI
# ------------------------------------------------------------------------------
# Note: ACL auth and usersExistingSecret defaults come from the chart's
# top-level values.yaml — CI only overrides resources and storage size.
valkey:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      memory: 256Mi
  dataStorage:
    enabled: true
    requestedSize: 1Gi

# ------------------------------------------------------------------------------
# Onyx subchart overrides
# ------------------------------------------------------------------------------
onyx:
  # ---------------------------------------------------------------------------
  # Core components: 1 replica each with minimal resources
  # ---------------------------------------------------------------------------
  api:
    replicaCount: 1
    resources:
      requests:
        cpu: 50m
        memory: 256Mi
      limits:
        memory: 1Gi

  webserver:
    replicaCount: 1
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        memory: 512Mi

  # ---------------------------------------------------------------------------
  # Vespa: REQUIRED through onyx v3.x (hardcoded runtime dependency in
  # factory.py). Reduced resources for CI. Drop when upstream ships v4.0.0.
  # ---------------------------------------------------------------------------
  vespa:
    enabled: true
    resources:
      requests:
        cpu: 200m
        memory: 2Gi
      limits:
        memory: 3Gi
    volumeClaimTemplates:
      - metadata:
          name: vespa-storage
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 2Gi

  # ---------------------------------------------------------------------------
  # OpenSearch: disabled because CI uses the operator-managed cluster
  # (opensearch-cluster.enabled: true via chart default).  Enabling both
  # would trigger the onyx-ai.opensearch.validate double-provision guard.
  # ---------------------------------------------------------------------------
  opensearch:
    enabled: false

  # ---------------------------------------------------------------------------
  # Code Interpreter: minimal resources for CI
  # ---------------------------------------------------------------------------
  codeInterpreter:
    enabled: true
    replicaCount: 1
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        memory: 512Mi

  # ---------------------------------------------------------------------------
  # Model servers: 1 replica each with minimal resources
  # These download multi-GB ML models at startup, so they need extended timeout.
  # ---------------------------------------------------------------------------
  inferenceCapability:
    replicaCount: 1
    resources:
      requests:
        cpu: 50m
        memory: 256Mi
      limits:
        memory: 2Gi
  indexCapability:
    replicaCount: 1
    resources:
      requests:
        cpu: 50m
        memory: 256Mi
      limits:
        memory: 2Gi

  # ---------------------------------------------------------------------------
  # Celery workers: 1 replica each with minimal resources
  # ---------------------------------------------------------------------------
  celery_beat:
    replicaCount: 1
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        memory: 512Mi

  celery_worker_primary:
    replicaCount: 1
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        memory: 512Mi

  celery_worker_light:
    replicaCount: 1
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        memory: 512Mi

  celery_worker_heavy:
    replicaCount: 1
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        memory: 512Mi

  celery_worker_monitoring:
    replicaCount: 1
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        memory: 512Mi

  celery_worker_docprocessing:
    replicaCount: 1
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        memory: 512Mi

  celery_worker_docfetching:
    replicaCount: 1
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        memory: 512Mi

  celery_worker_user_file_processing:
    replicaCount: 1
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        memory: 512Mi

  # ---------------------------------------------------------------------------
  # ConfigMap overrides: POSTGRES_HOST points at the direct -rw service to
  # match the pooler-rw name expected by the onyx-ai.postgresql.validate guard
  # (pooler is named "rw", so the service is "...-pooler-rw").
  # OpenSearch envs point at the operator-managed cluster.
  # ---------------------------------------------------------------------------
  configMap:
    POSTGRES_HOST: "onyx-ai-postgresql-cluster-rw"
    OPENSEARCH_HOST: "onyx-ai-opensearch"
    OPENSEARCH_REST_API_PORT: "9200"
    ENABLE_OPENSEARCH_INDEXING_FOR_ONYX: "true"
    ENABLE_OPENSEARCH_RETRIEVAL_FOR_ONYX: "true"

# ------------------------------------------------------------------------------
# OpenSearch cluster subchart - minimal for CI
# ------------------------------------------------------------------------------
# NOTE: opensearch-operator must exist in the cluster before this Application
# can be reconciled. For CI rendering (helm template only), the CR is emitted
# even without the operator.
opensearch-cluster:
  enabled: true
  cluster:
    general:
      version: "2.19.1"
    nodePools:
      - component: nodes
        replicas: 1
        diskSize: "1Gi"
        roles:
          - master
          - data
          - ingest
        resources:
          requests:
            cpu: 100m
            memory: 512Mi
          limits:
            memory: 1Gi
        env:
          - name: OPENSEARCH_JAVA_OPTS
            value: "-Xmx512m -Xms512m"
