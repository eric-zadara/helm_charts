# CI test values for onyx-ai chart — pooler disabled (direct -rw service)
#
# Exercises the regression path where operators explicitly disable the
# pgbouncer pooler and route onyx directly at the CNPG -rw service.

postgresql-cluster:
  enabled: true
  cluster:
    instances: 1
    storage:
      size: 1Gi
    resources: {}
    enableSuperuserAccess: true
    postgresql:
      parameters:
        max_connections: "100"
  # Pooler explicitly disabled — regression guard for the direct-service path
  poolers: []

# Since poolers are disabled, POSTGRES_HOST MUST be overridden to the direct
# -rw service or the validation helper will fail render.
onyx:
  configMap:
    POSTGRES_HOST: "onyx-ai-postgresql-cluster-rw"
    OPENSEARCH_HOST: "onyx-ai-opensearch"
    OPENSEARCH_REST_API_PORT: "9200"
    ENABLE_OPENSEARCH_INDEXING_FOR_ONYX: "true"
    ENABLE_OPENSEARCH_RETRIEVAL_FOR_ONYX: "true"
  api:
    replicaCount: 1
  webserver:
    replicaCount: 1
  vespa:
    enabled: false
  opensearch:
    enabled: false
  inferenceCapability:
    replicaCount: 1
  indexCapability:
    replicaCount: 1
  celery_beat:
    replicaCount: 1
  celery_worker_primary:
    replicaCount: 1
  celery_worker_light:
    replicaCount: 1
  celery_worker_heavy:
    replicaCount: 1
  celery_worker_monitoring:
    replicaCount: 1
  celery_worker_docprocessing:
    replicaCount: 1
  celery_worker_docfetching:
    replicaCount: 1
  celery_worker_user_file_processing:
    replicaCount: 1

opensearch-cluster:
  enabled: true
  cluster:
    nodePools:
      - component: nodes
        replicas: 1
        diskSize: "1Gi"
        roles: [master, data, ingest]
        resources:
          requests: { cpu: 100m, memory: 512Mi }
          limits: { memory: 1Gi }
        additionalConfig:
          ES_JAVA_OPTS: "-Xmx512m -Xms512m"
