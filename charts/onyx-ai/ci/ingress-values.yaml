# CI test values for onyx-ai chart — ingress rendering
#
# Tests the IngressRoute/Ingress template rendering with TLS and HSTS.
# All heavy components use replicaCount: 1 (minimum) for CI rendering.

ingress:
  enabled: true
  type: ingressroute
  host: "onyx.example.com"
  tls:
    enabled: true
    certResolver: "letsencrypt-prod"
    hsts:
      enabled: true
# Minimal onyx config to avoid heavy components
onyx:
  configMap:
    # Required by onyx-ai.ingress.validateWebDomain when ingress.enabled is true.
    # Must match ingress.host above (and use https when ingress.tls.enabled).
    WEB_DOMAIN: "https://onyx.example.com"
  opensearch:
    enabled: false
  codeInterpreter:
    enabled: false
  vespa:
    enabled: false
  api:
    replicaCount: 1
  webserver:
    replicaCount: 1
  inferenceCapability:
    replicaCount: 1
  indexCapability:
    replicaCount: 1
  celery_beat:
    replicaCount: 1
  celery_worker_primary:
    replicaCount: 1
  celery_worker_light:
    replicaCount: 1
  celery_worker_heavy:
    replicaCount: 1
  celery_worker_monitoring:
    replicaCount: 1
  celery_worker_docprocessing:
    replicaCount: 1
  celery_worker_docfetching:
    replicaCount: 1
  celery_worker_user_file_processing:
    replicaCount: 1
  auth:
    objectstorage:
      existingSecret: "onyx-ai-garage-credentials"
    postgresql:
      existingSecret: "onyx-ai-postgresql-cluster-superuser"
    redis:
      existingSecret: "onyx-ai-valkey"
      secretKeys:
        REDIS_PASSWORD: valkey-password
