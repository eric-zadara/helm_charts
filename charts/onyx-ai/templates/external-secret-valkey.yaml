{{/*
Valkey Credentials ExternalSecret
==================================
Optional ESO-managed Secret containing the Valkey password, sourced from
an upstream backend (Vault, AWS Secrets Manager, GCP SM, etc).

Renders ONLY when:
  - externalSecrets.enabled
  - externalSecrets.valkey.enabled

Replaces the wrapper's lookup-based `valkey-credentials-secret.yaml`
when ESO mode is active (same pattern as the garage ExternalSecret).
The target Secret has the SAME name (`{fullname}-valkey-credentials`)
and SAME key (`default-password`) as the lookup-based secret, so all
downstream wiring keeps working unchanged:

  - valkey subchart: `auth.usersExistingSecret: {fullname}-valkey-credentials`
    (pre-wired in values.yaml for release name "onyx-ai")
  - onyx.auth.redis.existingSecret: `{fullname}-valkey-credentials`
  - onyx.auth.redis.secretKeys.REDIS_PASSWORD: `default-password`

When `externalSecrets.valkey.enabled` is true, the lookup-based
`valkey-credentials-secret.yaml` short-circuits (see its skip-guard)
so there's no duplicate/conflicting Secret.

Why ESO instead of the wrapper's lookup pattern:
  Under ArgoCD's default helm-template rendering, Helm `lookup` returns
  nil and the wrapper regenerates a fresh random password on every
  sync. Sourcing from ESO makes the K8s Secret ESO-owned — ArgoCD
  never diffs it — and lets operators rotate by updating the backend.

OUT OF SCOPE: the Spotahome redis-ha-secret (created when
redis.ha.enabled: true) is NOT covered here. HA Redis users still
need ignoreDifferences for that one secret.
*/}}
{{- if and .Values.externalSecrets.enabled .Values.externalSecrets.valkey.enabled }}
{{- $secretName := printf "%s-valkey-credentials" (include "onyx-ai.fullname" .) -}}
{{- $refs := .Values.externalSecrets.valkey.remoteRefs -}}
{{- $required := list "default-password" -}}
{{- range $required }}
{{- $r := index $refs . -}}
{{- if or (not $r) (not $r.key) -}}
{{- fail (printf "externalSecrets.valkey.remoteRefs.%s.key is required when externalSecrets.valkey.enabled is true" .) -}}
{{- end -}}
{{- end }}
{{- $storeKind := .Values.externalSecrets.secretStoreRefKind | default "ClusterSecretStore" -}}
{{- $validKinds := list "SecretStore" "ClusterSecretStore" -}}
{{- if not (has $storeKind $validKinds) -}}
{{- fail (printf "externalSecrets.secretStoreRefKind must be one of: SecretStore, ClusterSecretStore (got %q)" $storeKind) -}}
{{- end -}}
{{- if not .Values.externalSecrets.secretStoreRefName -}}
{{- fail "externalSecrets.secretStoreRefName is required when externalSecrets.enabled is true" -}}
{{- end }}
apiVersion: {{ .Values.externalSecrets.apiVersion | default "external-secrets.io/v1beta1" }}
kind: ExternalSecret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "onyx-ai.labels" . | nindent 4 }}
    app.kubernetes.io/component: valkey-credentials
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval | default "1h" | quote }}
  secretStoreRef:
    kind: {{ $storeKind }}
    name: {{ .Values.externalSecrets.secretStoreRefName | quote }}
  target:
    name: {{ $secretName }}
    creationPolicy: Owner
  data:
    {{- range $required }}
    {{- $r := index $refs . }}
    - secretKey: {{ . | quote }}
      remoteRef:
        key: {{ $r.key | quote }}
        {{- if $r.property }}
        property: {{ $r.property | quote }}
        {{- end }}
    {{- end }}
{{- end }}
