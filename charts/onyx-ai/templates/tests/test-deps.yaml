{{/*
Wrapper-managed `helm test` Pod that exercises PostgreSQL, Redis, and the
api-server end-to-end. This is intentionally distinct from (and rendered
alongside) the upstream onyx subchart's own test-connection Pod, which
only checks the webserver. Both run when an operator invokes
`helm test {release}`.

The Pod name is deliberately NOT `{fullname}-test-connection` because the
upstream onyx subchart already produces a Pod with that exact name (its
helper `onyx.fullname` collapses to the parent release name when used as
a subchart). Two manifests with identical GVK+namespace+name trip
ArgoCD's RepeatedResourceWarning at render time even though both are
helm test hooks and neither would actually be applied during sync.
Using `{fullname}-test-deps` here keeps the names distinct.
*/}}
apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "onyx-ai.fullname" . }}-test-deps"
  labels:
    {{- include "onyx-ai.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
    - name: test-postgresql
      image: alpine:3.19
      command: ['sh', '-c']
      args:
        - |
          apk add --no-cache postgresql-client curl redis &&
          echo "=== Testing PostgreSQL ===" &&
          PGPASSWORD=$(cat /secrets/pg/password) pg_isready -h {{ .Values.onyx.configMap.POSTGRES_HOST }} -p {{ .Values.onyx.configMap.POSTGRES_PORT | default "5432" }} -U $(cat /secrets/pg/username) &&
          echo "PostgreSQL: OK" &&
          echo "=== Testing Redis ===" &&
          redis-cli -h {{ .Values.onyx.configMap.REDIS_HOST }} -a $(cat /secrets/redis/{{ .Values.onyx.auth.redis.secretKeys.REDIS_PASSWORD }}) ping &&
          echo "Redis: OK" &&
          echo "=== Testing API Server ===" &&
          curl -sf http://{{ .Release.Name }}-api-service:8080/health &&
          echo "API Server: OK"
      volumeMounts:
        - name: pg-secret
          mountPath: /secrets/pg
          readOnly: true
        - name: redis-secret
          mountPath: /secrets/redis
          readOnly: true
  volumes:
    - name: pg-secret
      secret:
        secretName: {{ .Values.onyx.auth.postgresql.existingSecret }}
    - name: redis-secret
      secret:
        secretName: {{ .Values.onyx.auth.redis.existingSecret }}
