{{/*
GarageFS Credentials ExternalSecret
====================================
Optional ESO-managed counterpart to garage-credentials-secret.yaml.

Renders ONLY when:
  - garage.enabled
  - externalSecrets.enabled
  - externalSecrets.garage.enabled

When this template renders, garage-credentials-secret.yaml is skipped (the
guard there checks the same conditions). The resulting Secret has the SAME
name as the wrapper would have created (`{fullname}-garage-credentials`)
so all downstream wiring (onyx.auth.objectstorage.existingSecret, garage
subchart bucket import job, NOTES.txt) keeps working unchanged.

Why ESO instead of Helm lookup:
  Helm `lookup` only works on `helm install/upgrade`. Under ArgoCD's default
  rendering mode (helm template), lookup returns nil, causing the wrapper to
  regenerate credentials on every sync. ESO removes that problem by sourcing
  credentials from an upstream backend and owning the resulting Secret —
  ArgoCD won't diff a resource it didn't create.

Backend layout:
  Operators populate four target keys via their own backend
  (Vault KV, AWS Secrets Manager, GCP SM, etc). Each remoteRef maps a
  target key to a (key, property) tuple in the backend. Typically the
  same backend path with two property names (accessKey, secretKey) is
  reused for both the s3_aws_* and garage_* pairs — the duplication is
  for compatibility with how the garage CLI vs Onyx's S3 client spell
  the keys.

This secret is referenced by:
  - onyx-ai.objectStorage.secretName helper (returns this name for GarageFS mode)
  - onyx.auth.objectstorage.existingSecret (wires to Onyx pods)
  - garage subchart bucket-import job (clusterConfig.keys.onyx.secretName)
*/}}
{{- if and .Values.garage.enabled .Values.externalSecrets.enabled .Values.externalSecrets.garage.enabled }}
{{- $secretName := printf "%s-garage-credentials" (include "onyx-ai.fullname" .) -}}
{{- $refs := .Values.externalSecrets.garage.remoteRefs -}}
{{- $required := list "s3_aws_access_key_id" "s3_aws_secret_access_key" "garage_access_key_id" "garage_secret_access_key" -}}
{{- range $required }}
{{- $r := index $refs . -}}
{{- if or (not $r) (not $r.key) -}}
{{- fail (printf "externalSecrets.garage.remoteRefs.%s.key is required when externalSecrets.garage.enabled is true" .) -}}
{{- end -}}
{{- end }}
{{- $storeKind := .Values.externalSecrets.secretStoreRefKind | default "ClusterSecretStore" -}}
{{- $validKinds := list "SecretStore" "ClusterSecretStore" -}}
{{- if not (has $storeKind $validKinds) -}}
{{- fail (printf "externalSecrets.secretStoreRefKind must be one of: SecretStore, ClusterSecretStore (got %q)" $storeKind) -}}
{{- end -}}
{{- if not .Values.externalSecrets.secretStoreRefName -}}
{{- fail "externalSecrets.secretStoreRefName is required when externalSecrets.enabled is true" -}}
{{- end }}
apiVersion: {{ .Values.externalSecrets.apiVersion | default "external-secrets.io/v1beta1" }}
kind: ExternalSecret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "onyx-ai.labels" . | nindent 4 }}
    app.kubernetes.io/component: garage-credentials
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval | default "1h" | quote }}
  secretStoreRef:
    kind: {{ $storeKind }}
    name: {{ .Values.externalSecrets.secretStoreRefName | quote }}
  target:
    name: {{ $secretName }}
    creationPolicy: Owner
  data:
    {{- range $required }}
    {{- $r := index $refs . }}
    - secretKey: {{ . | quote }}
      remoteRef:
        key: {{ $r.key | quote }}
        {{- if $r.property }}
        property: {{ $r.property | quote }}
        {{- end }}
    {{- end }}
{{- end }}
