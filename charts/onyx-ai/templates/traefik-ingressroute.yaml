{{/*
Traefik IngressRoute for Onyx
Routes traffic to API server (/api/*) and web server (/)
*/}}
{{- if and .Values.ingress.enabled (eq .Values.ingress.type "ingressroute") }}
{{- $fullName := include "onyx-ai.fullname" . -}}
{{- $apiService := printf "%s-api-service" .Release.Name -}}
{{- $webService := printf "%s-webserver" .Release.Name -}}
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ $fullName }}-ingress
  labels:
    {{- include "onyx-ai.labels" . | nindent 4 }}
  {{- /* Operator-supplied annotations from ingress.annotations.
       NOTE: no argocd.argoproj.io/sync-wave is injected here — see
       templates/garage-bootstrap-job.yaml for the full deadlock
       explanation. TL;DR: ArgoCD gates wave N+1 on wave N becoming
       Healthy; a non-zero wave here means the IngressRoute is only
       created after every wave-0 Deployment is Healthy, and if any
       Deployment trips progressDeadlineSeconds the sync fails
       before the IngressRoute is ever applied.

       ALSO NOTE about cert-manager.io/cluster-issuer: cert-manager's
       ingress-shim controller only watches networking.k8s.io/v1
       Ingress resources, NOT Traefik IngressRoute CRs. Setting a
       cert-manager.io/cluster-issuer annotation here is a no-op —
       cert-manager will never see it. If you want cert-manager to
       auto-provision certs for an IngressRoute, either (a) manually
       create a cert-manager.io/v1 Certificate resource and reference
       its secret via ingress.tls.secretName, or (b) switch to
       ingress.type: ingress with cert-manager's Ingress annotation,
       or (c) use Traefik's built-in ACME via ingress.tls.certResolver. */}}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  entryPoints:
    {{- toYaml .Values.ingress.traefik.entryPoints | nindent 4 }}
  routes:
    # API server route - more specific, must be listed first
    - match: Host(`{{ required "ingress.host is required when ingress.enabled is true" .Values.ingress.host }}`) && PathPrefix(`/api`)
      kind: Rule
      middlewares:
        - name: {{ $fullName }}-strip-api-prefix
          namespace: {{ .Release.Namespace }}
        {{- if .Values.ingress.tls.hsts.enabled }}
        - name: {{ $fullName }}-security-headers
          namespace: {{ .Release.Namespace }}
        {{- end }}
        {{- range .Values.ingress.traefik.middlewares }}
        - name: {{ . }}
        {{- end }}
      services:
        - name: {{ $apiService }}
          port: 8080
    # Web server route - catch-all, must be listed after API route
    - match: Host(`{{ .Values.ingress.host }}`)
      kind: Rule
      {{- if or .Values.ingress.tls.hsts.enabled .Values.ingress.traefik.middlewares }}
      middlewares:
        {{- if .Values.ingress.tls.hsts.enabled }}
        - name: {{ $fullName }}-security-headers
          namespace: {{ .Release.Namespace }}
        {{- end }}
        {{- range .Values.ingress.traefik.middlewares }}
        - name: {{ . }}
        {{- end }}
      {{- end }}
      services:
        - name: {{ $webService }}
          port: 3000
  {{- if .Values.ingress.tls.enabled }}
  tls:
    {{- if .Values.ingress.tls.secretName }}
    secretName: {{ .Values.ingress.tls.secretName }}
    {{- else if .Values.ingress.tls.certResolver }}
    certResolver: {{ .Values.ingress.tls.certResolver }}
    {{- end }}
  {{- end }}
---
{{/*
HTTP to HTTPS Redirect IngressRoute
Listens on 'web' entrypoint and redirects all traffic to HTTPS
*/}}
{{- if and .Values.ingress.tls.enabled .Values.ingress.tls.httpRedirect }}
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ $fullName }}-ingress-http
  labels:
    {{- include "onyx-ai.labels" . | nindent 4 }}
  {{- /* Same annotations propagation as the main IngressRoute. See
       the comment there for the sync-wave note and the
       cert-manager-on-IngressRoute caveat. */}}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`{{ .Values.ingress.host }}`)
      kind: Rule
      middlewares:
        - name: {{ $fullName }}-redirect-https
          namespace: {{ .Release.Namespace }}
      services:
        # Dummy service - redirect happens before reaching service
        - name: {{ $webService }}
          port: 3000
{{- end }}
{{- end }}
