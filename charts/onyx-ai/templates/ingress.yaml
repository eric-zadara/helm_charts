{{/*
Standard Kubernetes Ingress for Onyx
Split into two Ingress resources because Traefik middleware annotations
apply to the entire Ingress, not per-path. API needs stripPrefix, web does not.
*/}}
{{- if and .Values.ingress.enabled (eq .Values.ingress.type "ingress") }}
{{- $fullName := include "onyx-ai.fullname" . -}}
{{- $apiService := printf "%s-api-service" .Release.Name -}}
{{- $webService := printf "%s-webserver" .Release.Name -}}
{{- $userAnnotations := .Values.ingress.annotations | default dict -}}
---
# API Ingress - handles /api path with stripPrefix middleware
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $fullName }}-ingress-api
  labels:
    {{- include "onyx-ai.labels" . | nindent 4 }}
  annotations:
    {{- /* NO argocd.argoproj.io/sync-wave annotation — see
         templates/garage-bootstrap-job.yaml for the deadlock
         explanation. TL;DR: ArgoCD strictly gates wave N+1 on wave
         N becoming Healthy. A non-zero wave here means the Ingress
         is only applied after every wave-0 Deployment is Healthy.
         If any wave-0 Deployment trips its progressDeadlineSeconds
         (e.g. api-server waiting on slow CNPG postgres startup),
         the sync fails and the Ingress is never created. Ingresses
         have no ordering dependency on Deployments — the Services
         they route to are already at wave 0. */}}
    {{- /* Traefik-specific annotations. Each auto-emitted annotation
         is suppressed when the operator has already set the same key
         in ingress.annotations — YAML technically permits duplicate
         keys but it's ugly in diffs and confusing to read. An
         explicit user-supplied value always wins over the chart
         default. */ -}}
    {{- if eq .Values.ingress.className "traefik" }}
    {{- if and .Values.ingress.traefik.entryPoints (not (hasKey $userAnnotations "traefik.ingress.kubernetes.io/router.entrypoints")) }}
    traefik.ingress.kubernetes.io/router.entrypoints: {{ join "," .Values.ingress.traefik.entryPoints }}
    {{- end }}
    {{- if not (hasKey $userAnnotations "traefik.ingress.kubernetes.io/router.middlewares") }}
    traefik.ingress.kubernetes.io/router.middlewares: {{ .Release.Namespace }}-{{ $fullName }}-strip-api-prefix@kubernetescrd
    {{- end }}
    {{- end }}
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ required "ingress.host is required when ingress.enabled is true" .Values.ingress.host | quote }}
      {{- if .Values.ingress.tls.secretName }}
      secretName: {{ .Values.ingress.tls.secretName }}
      {{- end }}
  {{- end }}
  rules:
    - host: {{ required "ingress.host is required when ingress is enabled" .Values.ingress.host | quote }}
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: {{ $apiService }}
                port:
                  number: 8080
---
# Web Ingress - handles / path WITHOUT stripPrefix middleware
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $fullName }}-ingress-web
  labels:
    {{- include "onyx-ai.labels" . | nindent 4 }}
  annotations:
    {{- /* See the comment block on the api Ingress above for why
         there is NO argocd.argoproj.io/sync-wave annotation here,
         and why the auto-emitted annotation is suppressed when the
         operator has already set the same key in ingress.annotations. */}}
    {{- /* Traefik entrypoints only, NO middleware for web server */ -}}
    {{- if eq .Values.ingress.className "traefik" }}
    {{- if and .Values.ingress.traefik.entryPoints (not (hasKey $userAnnotations "traefik.ingress.kubernetes.io/router.entrypoints")) }}
    traefik.ingress.kubernetes.io/router.entrypoints: {{ join "," .Values.ingress.traefik.entryPoints }}
    {{- end }}
    {{- end }}
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.ingress.host | quote }}
      {{- if .Values.ingress.tls.secretName }}
      secretName: {{ .Values.ingress.tls.secretName }}
      {{- end }}
  {{- end }}
  rules:
    - host: {{ required "ingress.host is required when ingress is enabled" .Values.ingress.host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ $webService }}
                port:
                  number: 3000
{{- end }}
