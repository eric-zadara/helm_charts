{{/*
Valkey Credentials Secret
=========================
Wrapper-managed secret for the upstream valkey-io/valkey-helm chart.

The upstream chart's `auth.usersExistingSecret` mounts a Secret at
/valkey-auth-secret/ in the Valkey pod and reads each ACL user's password
from a file named `<username>-password`. The wrapper generates the
default user's password here so we can:

1. **Persist the password across upgrades** via Helm `lookup` (the upstream
   chart has no lookup logic — passing inline passwords would rotate the
   credential on every helm template render).
2. **Expose the same password to onyx pods** via `onyx.auth.redis.*` —
   onyx reads it as the `default-password` key in this same secret.

Created ONLY when `redis.enabled: true` AND `redis.ha.enabled: false` AND
`externalRedis.host` is empty (i.e. when we're actually running an embedded
valkey via the upstream chart).

Pattern: same as garage-credentials-secret.yaml and redis-ha-secret.yaml.

SKIPPED entirely when externalSecrets.enabled AND externalSecrets.valkey.enabled.
In that case the operator manages the secret via External Secrets Operator
(see templates/external-secret-valkey.yaml). The ExternalSecret produces a
Secret with the SAME name (`{fullname}-valkey-credentials`) and the SAME
key (`default-password`), so all downstream wiring (valkey subchart's
`auth.usersExistingSecret`, onyx.auth.redis.existingSecret) continues to
work unchanged.

This secret is referenced by:
- valkey subchart `auth.usersExistingSecret` (read by valkey pod's init script)
- onyx.auth.redis.existingSecret (wires to onyx pods via secretKeyRef)
*/}}
{{- if and .Values.redis.enabled (not .Values.redis.ha.enabled) (not .Values.externalRedis.host) (not (and .Values.externalSecrets.enabled .Values.externalSecrets.valkey.enabled)) -}}
{{- $secretName := printf "%s-valkey-credentials" (include "onyx-ai.fullname" .) -}}
{{- $existingSecret := lookup "v1" "Secret" .Release.Namespace $secretName -}}
{{- $password := "" -}}
{{- if $existingSecret -}}
  {{- /* Reuse existing password to prevent rotation on upgrade */ -}}
  {{- $password = index $existingSecret.data "default-password" | b64dec -}}
{{- else -}}
  {{- /* Generate new secure password (32 chars alphanumeric) */ -}}
  {{- $password = randAlphaNum 32 -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "onyx-ai.labels" . | nindent 4 }}
    app.kubernetes.io/component: valkey-credentials
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
type: Opaque
stringData:
  # Key: default-password
  # - valkey-io/valkey-helm reads this via auth.usersExistingSecret as the
  #   password for the ACL `default` user (the chart looks up
  #   "<username>-password" files, so the key MUST be "default-password").
  # - onyx pods read the same key via onyx.auth.redis.existingSecret with
  #   secretKeys.REDIS_PASSWORD: default-password.
  default-password: {{ $password | quote }}
{{- end }}
