{{/*
OpenSearch Admin Credentials Secret
===================================
Wrapper-managed secret for the opensearch-k8s-operator's admin credentials.

The operator uses this secret to authenticate to OpenSearch for cluster
management operations (drain data nodes on rolling upgrade, snapshot
management, user/role reconciliation).

Onyx ALSO consumes this secret via onyx.auth.opensearch.existingSecret
(remapped key names: username, password — NOT opensearch_admin_username).

Created ONLY when opensearch-cluster.enabled is true. Uses the Helm `lookup`
pattern so the password persists across upgrades — prevents the garage-chart
randHex drift class we fixed in 0.2.5.

Pattern: identical to valkey-credentials-secret.yaml and garage-credentials-secret.yaml.
*/}}
{{- if eq (include "onyx-ai.opensearchEnabled" .) "true" }}
{{- $secretName := "onyx-ai-opensearch-admin" -}}
{{- $existingSecret := lookup "v1" "Secret" .Release.Namespace $secretName -}}
{{- $username := "admin" -}}
{{- $password := "" -}}
{{- if $existingSecret -}}
  {{- /* Reuse existing password to prevent rotation on upgrade */ -}}
  {{- $password = index $existingSecret.data "password" | b64dec -}}
{{- else -}}
  {{- /* Generate new secure password (32 chars alphanumeric) */ -}}
  {{- $password = randAlphaNum 32 -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "onyx-ai.labels" . | nindent 4 }}
    app.kubernetes.io/component: opensearch-credentials
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
    helm.sh/resource-policy: keep
    argocd.argoproj.io/compare-options: IgnoreExtraneous
type: Opaque
# IMPORTANT: Use `data:` + b64enc, NOT `stringData:`. See 0.2.5 drift fix
# notes — stringData produces a structural mismatch with ArgoCD's
# ignoreDifferences jsonPointer on `/data` and causes password rotation
# on every sync.
data:
  username: {{ $username | b64enc | quote }}
  password: {{ $password | b64enc | quote }}
{{- end }}
