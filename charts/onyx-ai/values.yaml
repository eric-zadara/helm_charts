# onyx-ai values
# Convenience Helm chart wrapping Onyx with HA defaults
#
# Values under `onyx:` are passed directly to the upstream Onyx chart.
# See: https://github.com/onyx-dot-app/onyx/blob/main/deployment/helm/charts/onyx/values.yaml
#
# IMPORTANT: Upstream uses aliases in Chart.yaml:
#   - `postgresql:` (not `cloudnative-pg:`) for the CNPG cluster
#   - `nginx:` (not `ingress-nginx:`) for the ingress controller
# Always use the alias names when overriding subchart values.
#
# ------------------------------------------------------------------------------
# BATTERIES-INCLUDED DEFAULTS (release name convention)
# ------------------------------------------------------------------------------
# This chart defaults all internal wiring (POSTGRES_HOST, REDIS_HOST, S3
# endpoints, auth secrets) to assume the release name is "onyx-ai" — the
# same as the chart name. This is the standard umbrella-chart convention:
#
#   helm install onyx-ai charts/onyx-ai          # works out of the box
#   helm install onyx-ai charts/onyx-ai \
#     --set ingress.enabled=true \
#     --set ingress.host=onyx.lab.local           # minimal user config
#
# If you use a DIFFERENT release name, override the wiring values:
#   onyx.configMap.POSTGRES_HOST, onyx.configMap.REDIS_HOST,
#   onyx.configMap.S3_ENDPOINT_URL, onyx.auth.postgresql.existingSecret,
#   onyx.auth.redis.existingSecret, onyx.auth.objectstorage.existingSecret
#
# The chart NOTES.txt will warn you when a custom release name is detected.

# ------------------------------------------------------------------------------
# Convenience Chart Values (onyx-ai specific)
# ------------------------------------------------------------------------------

# Global values accessible to all charts
global:
  # Variant: onyx (default), onyx-foss (explicit FOSS intent), or custom (manual image config)
  # Note: onyx and onyx-foss use same onyxdotapp/* images; EE features require separate licensing
  variant: "onyx"
  # Registry prefix for air-gapped deployments (e.g., "my-registry.example.com/mirror")
  imageRegistry: ""
  # Pull secrets for private registries
  imagePullSecrets: []
  # Storage class for persistent volumes (empty = use cluster default)
  storageClass: ""

# ------------------------------------------------------------------------------
# External PostgreSQL Configuration
# ------------------------------------------------------------------------------
# Use when postgresql-cluster.enabled: false. Connect to existing PostgreSQL instance.

externalPostgresql:
  host: ""
  port: 5432
  database: "postgres"
  # Credentials - use existingSecret (recommended) or inline values
  existingSecret: ""  # Secret with 'username' and 'password' keys
  # Inline credentials (only if existingSecret is empty)
  username: ""
  password: ""

# ------------------------------------------------------------------------------
# Redis Configuration (Phase 4 - Valkey)
# ------------------------------------------------------------------------------
# Redis-compatible store for Celery task queue. Three modes available:
#   1. Default: valkey-io/valkey-helm (official Valkey chart, Redis-compatible fork)
#   2. HA: Spotahome Redis Operator (requires operator pre-installed)
#   3. External: Connect to existing Redis/Valkey (AWS ElastiCache, Azure Cache, etc.)
#
# Priority: externalRedis.host > redis.ha.enabled > redis.enabled (default)

redis:
  # Enable Valkey via valkey-io/valkey-helm (Redis-compatible, no operator required)
  # IMPORTANT: You MUST set this to false when using HA mode or external Redis.
  # Helm values.yaml cannot contain template logic, so this is not auto-disabled.
  # The chart validates that only one Redis mode is active and will fail with a
  # clear error message if multiple modes are enabled simultaneously.
  enabled: true

  # HA mode using Spotahome Redis Operator (RedisFailover CRD)
  # Requires: Spotahome Redis Operator pre-installed in cluster
  # IMPORTANT: When enabling HA mode, you MUST also set:
  #   - redis.enabled: false (in this section)
  #   - onyx.redis.enabled: false (in onyx: section below)
  ha:
    enabled: false
    # Redis instances (followers)
    replicas: 3
    # Sentinel instances (for failover coordination)
    sentinels: 3
    # Resource limits for Redis pods
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
    # Resource limits for Sentinel pods
    sentinelResources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 100m
        memory: 128Mi
    # Storage configuration
    storage:
      # Persistence for Redis data
      enabled: true
      size: 2Gi
      storageClass: ""  # Empty = use global.storageClass or cluster default
    # Custom Redis configuration (optional)
    customConfig: {}

  # Database number for general Redis operations
  database: 0

# ------------------------------------------------------------------------------
# External Redis Configuration
# ------------------------------------------------------------------------------
# Use when both redis.enabled: false AND redis.ha.enabled: false.
# Connect to existing Redis instance (AWS ElastiCache, Azure Cache, etc.)

externalRedis:
  host: ""
  port: 6379
  # Credentials - use existingSecret (recommended) or inline password
  existingSecret: ""  # Secret with 'redis_password' key
  password: ""        # Only if existingSecret is empty
  # Database number
  database: 0
  # TLS configuration
  tls:
    enabled: false
    # Secret containing CA certificate (optional)
    secretName: ""

# ------------------------------------------------------------------------------
# Object Storage Configuration (Phase 5)
# ------------------------------------------------------------------------------
# External S3-compatible storage for Onyx file uploads.
# Supports AWS S3, GarageFS, MinIO, or any S3-compatible endpoint.
# Note: Bucket must pre-exist; chart does not create buckets.
#
# IMPORTANT: S3 env vars are wired to pods via the env-configmap (created by
# this chart, overriding upstream). Credentials are wired via onyx.auth.objectstorage.
# See onyx.auth.objectstorage section below for credential configuration.

objectStorage:
  # Endpoint URL - full URL including protocol
  # Leave empty for AWS S3 (uses default AWS endpoint)
  # Set for self-hosted: "http://garage.storage.svc:3900" or "https://minio.example.com"
  endpoint: ""

  # Bucket name (required)
  bucket: "onyx-file-store"

  # Object key prefix (optional)
  prefix: "onyx-files"

  # AWS region - only needed for AWS S3 (optional)
  region: ""

  # Credentials - use existingSecret (recommended) or inline values
  # Secret must contain 's3_aws_access_key_id' and 's3_aws_secret_access_key' keys
  # IMPORTANT: Also set onyx.auth.objectstorage.existingSecret to the same value!
  existingSecret: ""

  # Inline credentials (only if existingSecret is empty)
  # When set, creates secret: {release}-external-objectstorage
  # IMPORTANT: Also set onyx.auth.objectstorage.existingSecret to "{release}-external-objectstorage"!
  accessKey: ""
  secretKey: ""

  # IAM/IRSA mode - set true when using AWS IAM roles (EKS with IRSA)
  # When true, no credentials are configured (pods use IAM role)
  # IMPORTANT: Also set onyx.auth.objectstorage.enabled: false when using IAM!
  useIAM: false

  # TLS configuration
  tls:
    # Verify SSL certificates (default: true)
    # Set false for self-signed certs on self-hosted S3 (not recommended for production)
    verify: true

# ------------------------------------------------------------------------------
# GarageFS Built-in Object Storage (Phase 8.4)
# ------------------------------------------------------------------------------
# Optional built-in S3-compatible object storage for dev/testing.
# When enabled, auto-wires S3 endpoint and credentials to Onyx pods.
# Disabled by default - production deployments should use external S3.
#
# IMPORTANT: When garage.enabled is true, the objectStorage section is ignored.
# The chart auto-generates credentials and configures the bucket automatically.
# You do NOT need to touch objectStorage.* settings when using GarageFS.
#
# GarageFS provides a lightweight S3-compatible storage backend suitable for:
# - Development and testing environments
# - Self-hosted deployments without external S3
# - Single-node or small cluster deployments
#
# For production with high durability requirements, consider external S3
# (AWS S3, MinIO cluster, etc.) with proper backup and replication.

garage:
  # Enable built-in GarageFS object storage (batteries-included default)
  enabled: true

  # Bucket name (defaults to release-scoped name for multi-tenancy)
  # Default: {{ .Release.Name }}-files
  bucket: ""

  # Credentials (auto-generated if not provided, persisted across upgrades)
  # Only set these if you need specific credential values
  accessKey: ""
  secretKey: ""

  # Replication factor (1 for single node, 2-3 for production-like durability)
  # IMPORTANT: Must be <= number of garage replicas (deployment.replicaCount below)
  replicationFactor: 1

  # ---------------------------------------------------------------------------
  # GarageFS Subchart Configuration (datahub-local/garage-helm)
  # ---------------------------------------------------------------------------
  # Values below are passed to the garage subchart.
  # See: https://github.com/datahub-local/garage-helm

  # Garage core settings (passed to garage.toml)
  garage:
    replicationFactor: "1"
    dbEngine: lmdb
    blockSize: "1048576"
    # Secret configuration - required for garage to work
    # If not provided, random secrets will be generated
    secret:
      create: true
      rpcSecret: ""
      adminToken: ""

  # Deployment configuration
  deployment:
    kind: StatefulSet
    replicaCount: 1
    podManagementPolicy: Parallel

  # Resource limits for GarageFS pods
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  # Storage configuration
  persistence:
    enabled: true
    meta:
      size: 100Mi
      storageClass: ""  # Empty = use cluster default
    data:
      size: 10Gi
      storageClass: ""  # Empty = use cluster default

  # Service configuration
  service:
    type: ClusterIP
    ports:
      s3Api: 3900
      rpc: 3901
      s3Web: 3902
      admin: 3903

  # ---------------------------------------------------------------------------
  # Cluster configuration (UPSTREAM job — DISABLED in favor of bootstrap below)
  # ---------------------------------------------------------------------------
  # The upstream datahub-local/garage-helm clusterConfig job uses shell with
  # `|| true` on every command, including `bucket allow`. If permission
  # granting silently fails (multi-node convergence races, etc.), garage's
  # authoritative state ends up wrong, the configure job exits success
  # anyway, and onyx pods crashloop forever on AccessDenied because nothing
  # ever fixes the permissions.
  #
  # We replace it with our own `garage.bootstrap` job (see below) which uses
  # the garage admin API v2 directly, no `|| true`, with proper retries and
  # explicit verification of bucket-key permissions.
  #
  # Do NOT re-enable this without also disabling the wrapper bootstrap job;
  # they will fight over layout assignment and key import.
  clusterConfig:
    enabled: false
    buckets:
      - name: onyx-ai-files
    keys:
      onyx:
        secretName: onyx-ai-garage-credentials
        keyId: garage_access_key_id
        secretKey: garage_secret_access_key
        buckets:
          - onyx-ai-files

  # ---------------------------------------------------------------------------
  # Wrapper-managed Garage Bootstrap Job
  # ---------------------------------------------------------------------------
  # Replaces upstream garage.clusterConfig (see note above). Runs as a Helm
  # post-install,post-upgrade hook. Configures cluster layout, bucket, key,
  # and bucket-key permissions via the garage admin API v2 (HTTP). Idempotent
  # and verified — fails the helm install loudly if permissions can't be
  # granted, instead of leaving onyx in a permanent CrashLoopBackOff.
  #
  # See templates/garage-bootstrap-configmap.yaml for the python script.
  bootstrap:
    image:
      repository: python
      tag: "3.12-slim"
      pullPolicy: IfNotPresent
    # Friendly name for the imported access key (visible in `garage key list`).
    keyName: "onyx"
    # Layout zone label assigned to garage nodes.
    zone: "dc1"
    # Per-node capacity in bytes assigned to the cluster layout. Default 10Gi.
    # For multi-node clusters, every node gets the same capacity. Increase
    # this if your garage data PVCs are larger than 10Gi and you want garage
    # to use the full PVC.
    capacityBytes: 10737418240  # 10 GiB
    # Maximum time to wait for the garage admin API to respond, the cluster
    # to become healthy, etc. (per phase, not total).
    readyTimeoutSeconds: 600
    # Per-step retry parameters. Each API call is retried with this many
    # attempts and this many seconds of backoff between attempts.
    stepRetries: 30
    stepBackoffSeconds: 5
    # Helm Job knobs.
    backoffLimit: 6
    ttlSecondsAfterFinished: 3600
    # Resources for the bootstrap pod (small — it just makes HTTP calls).
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi

# ------------------------------------------------------------------------------
# Ingress Configuration (Phase 7)
# ------------------------------------------------------------------------------
# Expose Onyx via Kubernetes Ingress or Traefik IngressRoute.
# Supports standard Ingress (portable) or Traefik IngressRoute CRD (advanced features).
# Note: Upstream nginx subchart is disabled; this chart manages ingress directly.

ingress:
  # Enable ingress resources (disabled by default - users must configure)
  enabled: false

  # Type: "ingress" (standard K8s Ingress) or "ingressroute" (Traefik CRD)
  # IngressRoute provides Traefik-native features like middleware, certResolver
  type: ingressroute

  # Hostname for the application (REQUIRED when enabled)
  # Example: onyx.example.com
  host: ""

  # Ingress class name (for standard Ingress type)
  # Common values: "traefik", "nginx", "haproxy"
  className: "traefik"

  # Annotations for standard Ingress (arbitrary map)
  # Not used for IngressRoute type
  annotations: {}

  # TLS configuration
  tls:
    # Enable TLS termination
    enabled: false
    # Use existing TLS secret (from cert-manager or pre-created)
    # Example: "onyx-tls-secret"
    secretName: ""
    # OR use Traefik ACME certResolver (IngressRoute only)
    # Example: "letsencrypt-prod"
    certResolver: ""
    # HTTP to HTTPS redirect (when TLS enabled)
    httpRedirect: true
    # HSTS configuration (disabled by default per user decision)
    hsts:
      enabled: false
      maxAge: 31536000
      includeSubdomains: true
      preload: false

  # Traefik-specific configuration (applies to both types)
  traefik:
    # IMPORTANT: "websecure" requires TLS (ingress.tls.enabled: true).
    # Use ["web"] for plain HTTP without TLS.
    entryPoints:
      - websecure
    # Additional middleware references (namespace/name format)
    # These are applied to ALL routes in addition to chart-created middleware
    # Example: ["myns-ratelimit@kubernetescrd", "myns-compress@kubernetescrd"]
    middlewares: []

# ------------------------------------------------------------------------------
# External Secrets Operator (ESO) Integration
# ------------------------------------------------------------------------------
# Optional integration with external-secrets.io. When enabled, the wrapper
# creates ExternalSecret CRs that tell ESO to populate the garage and valkey
# credentials secrets from an upstream backend (Vault, AWS Secrets Manager,
# GCP SM, etc.) instead of having the wrapper generate random values via
# Helm lookup.
#
# Why: under ArgoCD (helm template mode) the lookup-based secrets regenerate
# on every sync because Helm `lookup` returns nil outside of `helm install`.
# ESO management is the production-grade fix — ESO owns the resulting Secret
# and ArgoCD does not diff it, so the per-sync `ignoreDifferences` workaround
# documented in docs/argocd.md becomes unnecessary for ESO-managed secrets.
#
# Requirements:
#   - external-secrets-operator must be installed in the cluster
#   - A SecretStore or ClusterSecretStore must exist and be accessible from
#     the chart's namespace
#   - The operator must have the secret paths populated with the expected
#     keys (see the per-secret `remoteRefs` documentation below)
#
# Out of scope (TODO): Spotahome RedisFailover (redis.ha) ESO integration.
# Today the redis-ha-secret.yaml lookup pattern is unchanged when ESO is
# enabled — only garage and valkey are covered in this pass.

externalSecrets:
  # Master switch. When false, no ExternalSecret CRs are rendered and the
  # wrapper falls back to its existing Helm-lookup credential generation.
  enabled: false

  # Which SecretStore kind to reference. Most common: ClusterSecretStore.
  # Allowed: "SecretStore" or "ClusterSecretStore"
  secretStoreRefKind: ClusterSecretStore

  # Name of the (Cluster)SecretStore resource. Must already exist and be
  # accessible from the chart's namespace.
  secretStoreRefName: ""

  # API version of the ExternalSecret CRD. Leave at default unless you're
  # on a non-standard ESO install.
  apiVersion: "external-secrets.io/v1beta1"

  # How often ESO reconciles from the backend. 1h is a reasonable default.
  refreshInterval: "1h"

  # ----------------------------------------------------------------------------
  # Per-secret configuration
  # ----------------------------------------------------------------------------
  # Each entry controls ONE ExternalSecret CR that maps remote backend values
  # into the K8s Secret consumed by the wrapper templates.

  garage:
    # When true AND externalSecrets.enabled is true, the wrapper skips
    # rendering garage-credentials-secret.yaml and instead renders an
    # ExternalSecret that populates a Secret with the same name
    # (`{fullname}-garage-credentials`).
    enabled: true

    # Map each target key (in the resulting K8s Secret) to a remote key in
    # the upstream backend. For Vault KV the `key` is the path (e.g.
    # "secret/data/onyx-ai/garage") and `property` is the field within
    # the JSON object at that path (e.g. "accessKey").
    #
    # Typically operators point both s3_aws_access_key_id and
    # garage_access_key_id at the same backend property (and likewise for
    # the secret keys). The duplication here exists because the garage CLI
    # and Onyx's S3 client spell the keys differently.
    #
    # All four keys below are required when externalSecrets.garage.enabled
    # is true; the wrapper fails the render with a clear error if any
    # `key` is empty.
    remoteRefs:
      s3_aws_access_key_id:
        key: ""           # e.g. "secret/data/onyx-ai/garage"
        property: ""      # e.g. "accessKey"
      s3_aws_secret_access_key:
        key: ""
        property: ""      # e.g. "secretKey"
      garage_access_key_id:
        key: ""
        property: ""      # e.g. "accessKey"
      garage_secret_access_key:
        key: ""
        property: ""      # e.g. "secretKey"

  valkey:
    # When true AND externalSecrets.enabled is true, the wrapper renders
    # an ExternalSecret that creates a `{fullname}-valkey-credentials`
    # Secret with key `default-password`.
    #
    # NOTE: Unlike garage, the wrapper does NOT generate a Valkey
    # credentials secret of its own — Bitnami's valkey subchart
    # auto-generates `{release}-valkey`. To actually USE the ESO-managed
    # secret, point the Bitnami subchart at it via:
    #
    #   valkey:
    #     auth:
    #       existingSecret: "{release}-valkey-credentials"
    #       existingSecretPasswordKey: "default-password"
    #
    #   onyx:
    #     auth:
    #       redis:
    #         existingSecret: "{release}-valkey-credentials"
    #         secretKeys:
    #           REDIS_PASSWORD: default-password
    enabled: true

    remoteRefs:
      default-password:
        key: ""           # e.g. "secret/data/onyx-ai/valkey"
        property: ""      # e.g. "password"

# ------------------------------------------------------------------------------
# Onyx Subchart Values (passthrough to upstream)
# ------------------------------------------------------------------------------
# All values under `onyx:` are passed directly to the upstream Onyx chart.
# Reference upstream values.yaml for full options:
# https://github.com/onyx-dot-app/onyx/blob/main/deployment/helm/charts/onyx/values.yaml

onyx:
  # Global settings (upstream)
  # Pin to a specific Onyx release — upstream defaults this to "latest"
  # which is unsafe for reproducible deploys. Bump in lockstep with the
  # onyx subchart version in Chart.yaml (upstream does not pin their
  # chart's appVersion either).
  global:
    version: "v3.1.2"
    pullPolicy: "IfNotPresent"

  # ---------------------------------------------------------------------------
  # Components to DISABLE (replaced by our configuration in later phases)
  # ---------------------------------------------------------------------------

  # Phase 7: Replaced by Traefik ingress
  nginx:
    enabled: false

  # Phase 5: Replaced by external S3 (GarageFS/AWS S3/etc.)
  minio:
    enabled: false

  # ---------------------------------------------------------------------------
  # Components to RETAIN with defaults
  # ---------------------------------------------------------------------------

  # ---------------------------------------------------------------------------
  # Phase 3: Disable upstream CNPG operator reliance
  # ---------------------------------------------------------------------------
  # We use our own cnpg/cluster subchart (alias: postgresql-cluster) instead.
  # The upstream postgresql: alias controls the CNPG operator chart, which we
  # don't need since the operator is already installed cluster-wide.
  postgresql:
    enabled: false  # Disabled - using postgresql-cluster subchart instead

  # Vespa search engine — REQUIRED through onyx v3.x (hardcoded runtime dependency).
  # The v3.x application code unconditionally instantiates VespaIndex in
  # factory.py's get_all_document_indices() and crashes on startup if Vespa
  # is unreachable. OpenSearch is the RETRIEVAL backend (via the
  # ENABLE_OPENSEARCH_RETRIEVAL_FOR_ONYX flag below), but Vespa still
  # receives all index writes as a dual-write partner.
  # Drop Vespa when upstream ships v4.0.0 (VespaIndex removed from code).
  vespa:
    enabled: true

  # ---------------------------------------------------------------------------
  # Phase 4: Redis subchart (DISABLED - using Valkey at wrapper level)
  # ---------------------------------------------------------------------------
  # The upstream OT Container Kit Redis subchart is disabled.
  # Redis/Valkey is provided by the valkey-io/valkey-helm dependency at
  # the wrapper chart level (condition: redis.enabled). This eliminates
  # the need for the OT Redis Operator.
  #
  # REDIS_HOST must be set via onyx.configMap.REDIS_HOST since the upstream
  # auto-set only fires when onyx.redis.enabled: true.
  redis:
    enabled: false

  # ---------------------------------------------------------------------------
  # ConfigMap overrides (injected into upstream onyx env-configmap)
  # ---------------------------------------------------------------------------
  # Pre-wired for release name "onyx-ai". Override if using a custom release name.
  configMap:
    # Next.js must bind to all interfaces for Kubernetes networking
    HOSTNAME: "0.0.0.0"
    # Routes through the CNPG session-mode pgbouncer pooler. The service name
    # is {cluster-fullname}-pooler-{pooler-name}. If you disable the pooler
    # (set postgresql-cluster.poolers: []), override this back to
    # "onyx-ai-postgresql-cluster-rw".
    POSTGRES_HOST: "onyx-ai-postgresql-cluster-pooler-rw"
    POSTGRES_PORT: "5432"
    # --- OpenSearch wiring (operator-managed cluster, dual-write) ---
    # v3.x dual-write: Vespa receives all index writes (hardcoded in factory.py),
    # OpenSearch ALSO receives writes (ENABLE_OPENSEARCH_INDEXING), and OpenSearch
    # handles all retrieval queries (ENABLE_OPENSEARCH_RETRIEVAL).
    #
    # The upstream configmap only emits OPENSEARCH_* keys when
    # onyx.opensearch.enabled is true AND hardcodes the retrieval flag to "false".
    # Since we disabled the upstream subchart (replaced by our operator-managed
    # cluster), we re-emit and flip the retrieval flag here.
    OPENSEARCH_HOST: "onyx-ai-opensearch"
    OPENSEARCH_REST_API_PORT: "9200"
    ENABLE_OPENSEARCH_INDEXING_FOR_ONYX: "true"
    ENABLE_OPENSEARCH_RETRIEVAL_FOR_ONYX: "true"
    # valkey-io/valkey-helm primary service is "{release}-valkey"
    # (no `-primary` suffix — this is the upstream chart's convention).
    REDIS_HOST: "onyx-ai-valkey"
    S3_ENDPOINT_URL: "http://onyx-ai-garage:3900"
    S3_FILE_STORE_BUCKET_NAME: "onyx-ai-files"
    S3_FILE_STORE_PREFIX: "onyx-files"
    # WARNING: Set to "true" when switching from GarageFS to external S3.
    # This is "false" by default because GarageFS uses internal HTTP (no TLS).
    S3_VERIFY_SSL: "false"
    AWS_REGION_NAME: "garage"

  # ---------------------------------------------------------------------------
  # Phase 5: Object Storage Credentials (auth.objectstorage passthrough)
  # ---------------------------------------------------------------------------
  # The upstream Onyx chart injects S3 credentials via auth.objectstorage.
  # Configure existingSecret to point to either:
  #   - Your pre-existing secret (same as objectStorage.existingSecret)
  #   - The auto-generated secret: "{release}-external-objectstorage"
  #     (created when objectStorage.accessKey is set)
  #
  # For IAM/IRSA mode: Set enabled: false (no credentials needed)
  #
  # The secret must contain keys:
  #   - s3_aws_access_key_id
  #   - s3_aws_secret_access_key
  #
  # WHY MANUAL CONFIGURATION IS REQUIRED:
  # Helm values.yaml cannot contain template expressions - they are evaluated
  # at render time, not in values.yaml. So existingSecret cannot be auto-computed.
  # This is a Helm limitation, not a chart bug.
  #
  # IMPORTANT: This section must be kept in sync with objectStorage.* settings!
  # Examples:
  #
  # 1. Using existingSecret:
  #    objectStorage:
  #      existingSecret: "my-s3-secret"
  #    onyx:
  #      auth:
  #        objectstorage:
  #          enabled: true
  #          existingSecret: "my-s3-secret"  # Same as above!
  #
  # 2. Using inline credentials (accessKey/secretKey):
  #    objectStorage:
  #      accessKey: "AKIA..."
  #      secretKey: "..."
  #    onyx:
  #      auth:
  #        objectstorage:
  #          enabled: true
  #          existingSecret: "myrelease-onyx-ai-external-objectstorage"
  #          # Format: {release}-{chart}-external-objectstorage
  #
  # 3. Using IAM/IRSA:
  #    objectStorage:
  #      useIAM: true
  #    onyx:
  #      auth:
  #        objectstorage:
  #          enabled: false  # No credentials needed
  auth:
    # ---------------------------------------------------------------------------
    # Object Storage Credentials (auth.objectstorage passthrough)
    # ---------------------------------------------------------------------------
    # The upstream Onyx chart injects S3 credentials via auth.objectstorage.
    #
    # GARAGEFS MODE (garage.enabled: true):
    # When GarageFS is enabled, you MUST set existingSecret to the garage credentials:
    #   onyx.auth.objectstorage.existingSecret: "{release}-onyx-ai-garage-credentials"
    # The chart validates this and provides the expected value in the error message.
    #
    # EXTERNAL S3 MODE:
    # When using external S3, set existingSecret to match your S3 credentials:
    #   - If using objectStorage.existingSecret: use the same secret name
    #   - If using inline credentials: use "{release}-onyx-ai-external-objectstorage"
    #
    # IAM/IRSA MODE:
    # Set enabled: false (no credentials needed for IAM role authentication)
    #
    # WHY MANUAL CONFIGURATION IS REQUIRED:
    # Helm values.yaml cannot contain template expressions. The existingSecret
    # value must be configured explicitly based on your deployment mode.
    objectstorage:
      # Set to false when using IAM/IRSA mode
      enabled: true
      # Pre-wired for GarageFS with release name "onyx-ai".
      # Override for custom release name or external S3.
      existingSecret: "onyx-ai-garage-credentials"
      # Key mappings (match upstream defaults - do not change)
      secretKeys:
        S3_AWS_ACCESS_KEY_ID: s3_aws_access_key_id
        S3_AWS_SECRET_ACCESS_KEY: s3_aws_secret_access_key

    # ---------------------------------------------------------------------------
    # Phase 8.2: PostgreSQL Credentials (auth.postgresql passthrough)
    # ---------------------------------------------------------------------------
    # The upstream Onyx chart injects PostgreSQL credentials via auth.postgresql.
    # When using CNPG, you MUST configure existingSecret to point to the
    # CNPG-generated app secret.
    #
    # CNPG creates secret: {release}-postgresql-cluster-app
    # Example for release "prod": existingSecret: "prod-postgresql-cluster-app"
    #
    # WHY MANUAL CONFIGURATION IS REQUIRED:
    # Helm values.yaml cannot contain template expressions - they are evaluated
    # at render time, not in values.yaml. So existingSecret cannot be auto-computed.
    #
    # IMPORTANT: When postgresql-cluster.enabled: true, you MUST set:
    #   onyx.auth.postgresql.existingSecret: "{release}-postgresql-cluster-app"
    #
    # For external PostgreSQL (postgresql-cluster.enabled: false):
    #   - Use externalPostgresql.existingSecret for credentials, then set:
    #     onyx.auth.postgresql.existingSecret: (same secret name)
    #   - OR use inline credentials (externalPostgresql.username/password), then set:
    #     onyx.auth.postgresql.existingSecret: "{release}-onyx-ai-external-postgresql"
    postgresql:
      enabled: true
      # Pre-wired for CNPG with release name "onyx-ai" (superuser for alembic migrations).
      # Override for custom release name or external PostgreSQL.
      existingSecret: "onyx-ai-postgresql-cluster-superuser"
      # Key mappings (match CNPG and upstream defaults - do not change)
      secretKeys:
        POSTGRES_USER: username
        POSTGRES_PASSWORD: password

    # ---------------------------------------------------------------------------
    # Redis Credentials (auth.redis passthrough)
    # ---------------------------------------------------------------------------
    # The upstream Onyx chart injects Redis credentials via auth.redis.
    # Configuration depends on Redis mode:
    #
    # 1. Default Valkey (redis.enabled: true):
    #    - Wrapper creates '{release}-valkey-credentials' via the
    #      templates/valkey-credentials-secret.yaml lookup pattern.
    #    - Key in secret: 'default-password' (matches valkey-io ACL convention).
    #    - You MUST set: onyx.auth.redis.existingSecret: "{release}-valkey-credentials"
    #    - secretKeys.REDIS_PASSWORD must be: default-password
    #
    # 2. HA Redis (redis.ha.enabled: true):
    #    - Wrapper creates '{fullname}-redis-ha' secret (fullname = release name
    #      when it contains chart name, e.g. "onyx-ai-redis-ha" for release "onyx-ai")
    #    - REDIS_HOST must be: rfr-{release}-redis-ha (e.g. "rfr-onyx-ai-redis-ha")
    #    - You MUST set: onyx.auth.redis.existingSecret: "{fullname}-redis-ha"
    #    - secretKeys.REDIS_PASSWORD must be: redis_password
    #
    # 3. External Redis (externalRedis.host set):
    #    - Use externalRedis.existingSecret for credentials, then set:
    #      onyx.auth.redis.existingSecret: (same secret name)
    #    - OR use inline password (externalRedis.password), then set:
    #      onyx.auth.redis.existingSecret: "{fullname}-external-redis"
    #    - secretKeys.REDIS_PASSWORD must be: redis_password
    #
    # WHY MANUAL CONFIGURATION IS REQUIRED:
    # Helm values.yaml cannot contain template expressions.
    redis:
      enabled: true
      # Pre-wired for valkey-io with release name "onyx-ai".
      # Override for custom release name, HA mode, or external Redis.
      existingSecret: "onyx-ai-valkey-credentials"
      # Key mappings - MUST match the secret key for your Redis mode:
      #   Valkey (default, valkey-io): default-password
      #   HA / External: redis_password
      secretKeys:
        REDIS_PASSWORD: default-password

    # User auth secret (for password reset tokens, OIDC state signing)
    # Required when using AUTH_TYPE "basic" with password reset or OIDC flows.
    # Generate secret: openssl rand -hex 32
    userauth:
      enabled: false
      secretKeys:
        USER_AUTH_SECRET: user_auth_secret
      values:
        user_auth_secret: ""

    # OpenSearch Credentials (auth.opensearch passthrough)
    #
    # Wrapper-owned admin credentials via templates/opensearch-admin-secret.yaml
    # (Helm lookup pattern). The wrapper-owned secret uses `username` and
    # `password` keys — NOT the upstream default `opensearch_admin_username` /
    # `opensearch_admin_password` — so we remap secretKeys accordingly.
    opensearch:
      enabled: true
      existingSecret: onyx-ai-opensearch-admin
      secretKeys:
        OPENSEARCH_ADMIN_USERNAME: username
        OPENSEARCH_ADMIN_PASSWORD: password

  # OpenSearch - disabled in 0.4.0 cutover (replaced by operator-managed cluster above)
  opensearch:
    enabled: false   # was: true — replaced by operator-managed cluster above

  # Code Interpreter - enabled by default since upstream 0.4.35
  codeInterpreter:
    enabled: true

  # Code Interpreter subchart image pin (hyphenated key = subchart name)
  # The upstream subchart defaults to appVersion "latest"; pin to match Onyx release.
  code-interpreter:
    image:
      tag: "0.1.0" # May need updating later

  # Slackbot - not needed by default
  slackbot:
    enabled: false

  # ---------------------------------------------------------------------------
  # Phase 6: API Server HA Configuration
  # ---------------------------------------------------------------------------
  # API server handles REST API requests. Default: 2 replicas for HA.
  # Resources use Guaranteed QoS (limits=requests for memory).
  api:
    replicaCount: 2
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: 1000m
        memory: 1Gi
    affinity:
      podAntiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                  - key: app
                    operator: In
                    values:
                      - api-server
              topologyKey: kubernetes.io/hostname
    readinessProbe:
      httpGet:
        path: /health
        port: 8080
      initialDelaySeconds: 15
      periodSeconds: 10

  # ---------------------------------------------------------------------------
  # Phase 6: Web Server HA Configuration
  # ---------------------------------------------------------------------------
  # Web server handles frontend (Next.js SSR). Default: 2 replicas for HA.
  # Resources use Guaranteed QoS (limits=requests for memory).
  webserver:
    replicaCount: 2
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: 500m
        memory: 512Mi
    affinity:
      podAntiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                  - key: app
                    operator: In
                    values:
                      - web-server
              topologyKey: kubernetes.io/hostname
    readinessProbe:
      httpGet:
        path: /
        port: 3000
      initialDelaySeconds: 15
      periodSeconds: 10

  # ---------------------------------------------------------------------------
  # Ingress (managed by wrapper chart in Phase 7)
  # ---------------------------------------------------------------------------

  # We manage ingress via Traefik IngressRoute in the wrapper chart
  ingress:
    enabled: false

# ------------------------------------------------------------------------------
# CloudNativePG Cluster (alias: postgresql-cluster → cnpg/cluster subchart)
# ------------------------------------------------------------------------------
# This block is the SINGLE SOURCE OF TRUTH for Postgres configuration.
# All keys are a direct passthrough to the cnpg/cluster subchart — see
# https://github.com/cloudnative-pg/charts for the full values schema.
#
# Set postgresql-cluster.enabled: false to use externalPostgresql instead.
# The wrapper dep condition (Chart.yaml) reads from postgresql-cluster.enabled.

postgresql-cluster:
  enabled: true    # gates the dep + all wrapper templates guarded on CNPG

  type: postgresql
  mode: standalone

  version:
    postgresql: "16"

  cluster:
    annotations:
      argocd.argoproj.io/sync-wave: "0"
    instances: 3
    storage:
      size: 20Gi
      storageClass: ""
    resources:
      requests:
        cpu: 500m
        memory: 2Gi      # bumped from 1Gi in 0.4.0 to give the backend headroom
                         # for concurrent session-mode pooler connections
      limits:
        cpu: 2000m
        memory: 8Gi      # bumped from 4Gi in 0.4.0
    primaryUpdateStrategy: unsupervised  # auto-failover during operator upgrades
    enableSuperuserAccess: true          # required for Alembic migrations
    postgresql:
      parameters:
        # Backend connection slots. Sized for the pooler's worst-case server-
        # side count, NOT the user-visible client cap. The user-visible "2000"
        # number lives on the pooler below (max_client_conn), where each client
        # costs ~2KB instead of ~10MB on a postgres backend.
        max_connections: "750"
        # Reclaim idle-in-transaction connections after 60s to prevent pool
        # starvation from crashed workers that hold open transactions.
        idle_in_transaction_session_timeout: "60000"  # milliseconds
      pg_hba: []

  # PgBouncer poolers — each entry becomes a CNPG Pooler CR. The cluster
  # subchart renders templates/pooler.yaml by iterating this list.
  #
  # DEFAULT: one session-mode rw pooler. Session mode is REQUIRED because
  # onyx.configMap.POSTGRES_HOST (below) points at the pooler Service, and
  # Alembic runs DDL on startup. Transaction mode would block DDL.
  #
  # To disable pooling entirely: set `poolers: []` AND override
  # `onyx.configMap.POSTGRES_HOST` to "{release}-postgresql-cluster-rw".
  poolers:
    - name: rw
      type: rw
      poolMode: session
      instances: 2
      parameters:
        default_pool_size: "250"
        # The user-visible "2000 connections" number lives HERE. pgbouncer
        # reserves ~2KB per client; 2000 ≈ 4MB heap per pooler pod. pgbouncer
        # queues overflow clients instead of returning FATAL when the
        # backend is saturated.
        max_client_conn: "2000"
      monitoring:
        enabled: false
        podMonitor:
          enabled: false
      # The subchart dumps this block raw under Pooler.spec.template.
      # It must be a full PodTemplateSpec — no short-form allowed.
      template:
        spec:
          containers:
            - name: pgbouncer
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: 500m
                  memory: 256Mi

  # Backups (disabled by default; configure here when enabling).
  backups:
    enabled: false

# ------------------------------------------------------------------------------
# GarageFS Chart Values (alias: garage)
# ------------------------------------------------------------------------------
# Passthrough to datahub-local/garage-helm subchart. Only active when garage.enabled: true.
# The wrapper chart auto-generates credentials and configures the bucket automatically.
#
# Subchart values are nested under garage: in the garage section above.
# The key structure maps to datahub-local/garage-helm chart values:
#   garage.garage.*       -> garage chart's garage.* (garage.toml config)
#   garage.deployment.*   -> garage chart's deployment.* (StatefulSet config)
#   garage.resources.*    -> garage chart's resources.* (pod resources)
#   garage.persistence.*  -> garage chart's persistence.* (storage config)
#   garage.service.*      -> garage chart's service.* (Kubernetes service config)
#
# See: https://github.com/datahub-local/garage-helm for full options

# ------------------------------------------------------------------------------
# Valkey Chart Values (valkey-io/valkey-helm — official upstream)
# ------------------------------------------------------------------------------
# Passthrough to valkey-io/valkey-helm subchart. Only active when
# redis.enabled: true. Official upstream chart maintained by the Linux
# Foundation Valkey project (BSD-3), tracks Valkey 9.x.
#
# Service naming:
#   - Primary service: {release}-valkey            (NO `-primary` suffix)
#   - Read service:    {release}-valkey-read       (only when replica.enabled)
#   - Headless:        {release}-valkey-headless
#   - Port:            6379 (TCP)
#
# Auth:
#   The upstream chart is ACL-based and does NOT auto-generate a password.
#   The wrapper provides one via templates/valkey-credentials-secret.yaml,
#   which uses the Helm `lookup` pattern so the password persists across
#   upgrades. We expose it to valkey via auth.usersExistingSecret and to
#   onyx via onyx.auth.redis.existingSecret (both pointing at the SAME
#   wrapper-created secret named "{release}-valkey-credentials").
#
# Onyx wiring:
#   The upstream Onyx chart does NOT deploy its own Redis when
#   onyx.redis.enabled: false, so REDIS_HOST is set explicitly via
#   onyx.configMap.REDIS_HOST passthrough below (= "{release}-valkey").
#
# See: https://github.com/valkey-io/valkey-helm

valkey:
  # ACL-based authentication.
  # The upstream chart REQUIRES an explicit `default` user when
  # auth.enabled is true. The wrapper provides the password via the
  # `usersExistingSecret` below; the chart's init script reads
  # /valkey-auth-secret/<username>-password from the mounted secret.
  auth:
    enabled: true
    # Wrapper-created secret with key `default-password`. The name is
    # hard-wired here for release name `onyx-ai`. If you use a different
    # release name, override this to "{release}-valkey-credentials".
    usersExistingSecret: onyx-ai-valkey-credentials
    aclUsers:
      default:
        # Full access — Onyx uses Celery on this Valkey, no isolation needed.
        permissions: "~* &* +@all"
        # Tells the chart's init script which key in usersExistingSecret to
        # read. Defaults to the username; we set it explicitly to be safe.
        passwordKey: default-password

  # Persistent storage for the standalone master.
  # NOTE: upstream chart uses `dataStorage`, not `primary.persistence`.
  dataStorage:
    enabled: true
    requestedSize: 2Gi
    className: ""  # Empty = cluster default

  # Resource requests/limits live at the top level (not under `primary:`).
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

  # Replication / HA — disabled by default. Set replica.enabled: true to
  # spin up master + N replicas. We're not using this today; HA continues
  # to be served by the redis.ha.enabled (Spotahome operator) path.
  replica:
    enabled: false

# ------------------------------------------------------------------------------
# OpenSearch (alias: opensearch-cluster → opensearch-project/opensearch-cluster)
# ------------------------------------------------------------------------------
# This block is the SINGLE SOURCE OF TRUTH for OpenSearch configuration.
# Direct passthrough to the opensearch-cluster subchart; see
# https://github.com/opensearch-project/opensearch-k8s-operator for the
# full values schema.
#
# Requires opensearch-operator installed cluster-wide. The platform install
# step is inference-operators ≥ 0.9.0 (or argo-examples-operators ≥ 0.0.15).
#
# Set opensearch-cluster.enabled: false to use externalOpenSearch instead.

opensearch-cluster:
  enabled: true
  apiGroup: opensearch.org  # stable CRD group (chart default; pinned for clarity)

  cluster:
    # Fixed cluster name so the generated Service is always
    # "onyx-ai-opensearch" regardless of how .Release.Name evolves.
    # Onyx env vars in onyx.configMap below key off this.
    name: onyx-ai-opensearch

    annotations:
      argocd.argoproj.io/sync-wave: "0"
      # Dataloss is acceptable today but require explicit operator action to
      # destroy the cluster. Blocks an accidental argocd app delete from
      # wiping OpenSearch data.
      helm.sh/resource-policy: keep

    general:
      version: "3.6.0"
      image: docker.io/opensearchproject/opensearch
      httpPort: 9200
      drainDataNodes: true          # safer rolling upgrades
      setVMMaxMapCount: true        # privileged init container sets sysctl
      serviceName: ""               # empty → defaults to cluster.name
      pluginsList: []
      snapshotRepositories: []      # enable later for S3 backups
      additionalConfig: {}

    dashboards:
      # OpenSearch Dashboards is not needed by Onyx. Operators who want the UI
      # can override this in a values overlay.
      enable: false

    confMgmt:
      smartScaler: true

    security:
      config:
        adminCredentialsSecret:
          # Wrapper-owned lookup-pattern secret; see
          # templates/opensearch-admin-secret.yaml
          name: onyx-ai-opensearch-admin
      tls:
        transport:
          generate: true
          perNode: true
        http:
          generate: true

    nodePools:
      # Default: single combined pool (masters + data + ingest), 3 replicas.
      # For dedicated-master topologies, split into two entries with different
      # replicas/resources. See ci/opensearch-dedicated-masters-values.yaml.
      - component: nodes
        replicas: 3
        diskSize: "30Gi"
        roles:
          - master
          - data
          - ingest
        resources:
          requests:
            cpu: "500m"
            memory: "2Gi"
          limits:
            cpu: "2000m"
            memory: "8Gi"
        jvm: "-Xmx3g -Xms3g"   # ~37.5% of memory limit; stays well below 50%/32Gi cap
        nodeSelector: {}
        tolerations: []
        affinity: {}
        topologySpreadConstraints: []
        additionalConfig: {}

# ------------------------------------------------------------------------------
# External OpenSearch Configuration
# ------------------------------------------------------------------------------
# Used when opensearch-cluster.enabled is false. Connect onyx to an existing
# OpenSearch deployment.

externalOpenSearch:
  host: ""
  port: 9200
  # Credentials - use existingSecret (recommended) or inline values.
  # The secret must contain `username` and `password` keys.
  existingSecret: ""
  username: ""
  password: ""
