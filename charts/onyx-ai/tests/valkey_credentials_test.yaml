suite: Valkey credentials secret + wiring
release:
  name: onyx-ai
  namespace: onyx
templates:
  - valkey-credentials-secret.yaml
tests:
  - it: renders by default when redis.enabled is true and no HA / external override
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Secret
      - equal:
          path: metadata.name
          value: onyx-ai-valkey-credentials
      - equal:
          path: metadata.labels["app.kubernetes.io/component"]
          value: valkey-credentials
      - equal:
          path: metadata.annotations["argocd.argoproj.io/sync-wave"]
          value: "-1"

  - it: has a default-password key (matches valkey-io ACL convention)
    asserts:
      - exists:
          path: stringData["default-password"]

  - it: does not render when redis.enabled is false
    set:
      redis.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: does not render when redis.ha.enabled is true
    set:
      redis.enabled: false
      redis.ha.enabled: true
    asserts:
      - hasDocuments:
          count: 0

  - it: does not render when externalRedis.host is set
    set:
      redis.enabled: false
      externalRedis.host: redis.example.com
      externalRedis.password: s3cret
    asserts:
      - hasDocuments:
          count: 0
