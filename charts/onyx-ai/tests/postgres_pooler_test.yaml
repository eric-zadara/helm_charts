suite: PostgreSQL pooler wiring + cnpg collapse
release:
  name: onyx-ai
  namespace: onyx-ai
templates:
  - charts/postgresql-cluster/templates/cluster.yaml
  - charts/postgresql-cluster/templates/pooler.yaml
  - templates/NOTES.txt
tests:
  - it: renders the cnpg Cluster CR with max_connections 750
    template: charts/postgresql-cluster/templates/cluster.yaml
    asserts:
      - isKind:
          of: Cluster
      - equal:
          path: spec.instances
          value: 3
      - equal:
          path: spec.postgresql.parameters.max_connections
          value: "750"
      - equal:
          path: spec.postgresql.parameters.idle_in_transaction_session_timeout
          value: "60000"
      - equal:
          path: spec.resources.requests.memory
          value: 2Gi
      - equal:
          path: spec.resources.limits.memory
          value: 8Gi

  - it: renders a single session-mode rw Pooler CR with max_client_conn 2000
    template: charts/postgresql-cluster/templates/pooler.yaml
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Pooler
      - equal:
          path: metadata.name
          value: onyx-ai-postgresql-cluster-pooler-rw
      - equal:
          path: spec.instances
          value: 2
      - equal:
          path: spec.type
          value: rw
      - equal:
          path: spec.pgbouncer.poolMode
          value: session
      - equal:
          path: spec.pgbouncer.parameters.max_client_conn
          value: "2000"
      - equal:
          path: spec.pgbouncer.parameters.default_pool_size
          value: "250"

  - it: pooler pgbouncer container has resource limits
    template: charts/postgresql-cluster/templates/pooler.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[0].name
          value: pgbouncer
      - equal:
          path: spec.template.spec.containers[0].resources.limits.memory
          value: 256Mi
      - equal:
          path: spec.template.spec.containers[0].resources.requests.memory
          value: 64Mi

  - it: does not render the Pooler when postgresql-cluster.poolers is empty
    template: charts/postgresql-cluster/templates/pooler.yaml
    set:
      postgresql-cluster.poolers: []
      onyx.configMap.POSTGRES_HOST: "onyx-ai-postgresql-cluster-rw"
    asserts:
      - hasDocuments:
          count: 0

  - it: render fails when POSTGRES_HOST points at pooler but pooler list is empty
    template: templates/NOTES.txt
    set:
      postgresql-cluster.poolers: []
      onyx.configMap.POSTGRES_HOST: "onyx-ai-postgresql-cluster-pooler-rw"
    asserts:
      - failedTemplate:
          errorMessage: "onyx.configMap.POSTGRES_HOST points at a pooler service, but postgresql-cluster.poolers is empty. Either add a pooler entry or override POSTGRES_HOST to end in -rw (the direct service)."
