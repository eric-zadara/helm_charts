suite: Ingress templates have no ArgoCD sync-wave annotation
templates:
  - ingress.yaml
  - traefik-ingressroute.yaml
release:
  name: onyx-ai
  namespace: onyx-ai

# Regression guard for the same class of bug that bit garage-bootstrap-job.yaml.
#
# ArgoCD strictly gates wave N+1 on wave N becoming Healthy. If any of the
# chart's wave-0 resources (every Deployment and StatefulSet, by default)
# fails to become Healthy within its progressDeadlineSeconds, the sync
# fails and nothing at a higher wave is ever applied. Ingresses have NO
# ordering dependency on Deployments — the Services they route to exist
# at wave 0 and are always reachable once rendered — so placing them at
# wave 1 just creates a fragility where transient Deployment startup
# delays (e.g. api-server waiting on slow CNPG postgres) permanently
# strand the ingress resources.
#
# The fix is identical to what we did for the bootstrap Job: drop the
# sync-wave annotation entirely, let the ingresses apply at the default
# wave 0, and rely on Kubernetes' own ordering (a rule pointing at a
# Service that does not yet back any ready pods simply returns 503
# until the pods come up, which is exactly the desired behavior).

tests:
  # --------------------------------------------------------------------------
  # Standard Ingress path (ingress.type: ingress) — both Ingress resources
  # --------------------------------------------------------------------------
  - it: Ingress (api) has no sync-wave annotation
    template: ingress.yaml
    values:
      - ../ci/ingress-standard-values.yaml
    documentIndex: 0
    asserts:
      - equal:
          path: kind
          value: Ingress
      - equal:
          path: metadata.name
          value: onyx-ai-ingress-api
      - notExists:
          path: metadata.annotations["argocd.argoproj.io/sync-wave"]

  - it: Ingress (web) has no sync-wave annotation
    template: ingress.yaml
    values:
      - ../ci/ingress-standard-values.yaml
    documentIndex: 1
    asserts:
      - equal:
          path: kind
          value: Ingress
      - equal:
          path: metadata.name
          value: onyx-ai-ingress-web
      - notExists:
          path: metadata.annotations["argocd.argoproj.io/sync-wave"]

  # --------------------------------------------------------------------------
  # Traefik IngressRoute path (ingress.type: ingressroute) — main + http redirect
  # --------------------------------------------------------------------------
  - it: IngressRoute has no sync-wave annotation
    template: traefik-ingressroute.yaml
    values:
      - ../ci/ingress-values.yaml
    documentIndex: 0
    asserts:
      - equal:
          path: kind
          value: IngressRoute
      - equal:
          path: metadata.name
          value: onyx-ai-ingress
      - notExists:
          path: metadata.annotations["argocd.argoproj.io/sync-wave"]

  - it: HTTP-redirect IngressRoute has no sync-wave annotation
    template: traefik-ingressroute.yaml
    values:
      - ../ci/ingress-values.yaml
    documentIndex: 1
    asserts:
      - equal:
          path: kind
          value: IngressRoute
      - equal:
          path: metadata.name
          value: onyx-ai-ingress-http
      - notExists:
          path: metadata.annotations["argocd.argoproj.io/sync-wave"]

  # --------------------------------------------------------------------------
  # ingress.annotations propagation — both Ingress (standard) and IngressRoute
  # --------------------------------------------------------------------------
  # Regression guard for two distinct bugs:
  #   1. IngressRoute template did not propagate ingress.annotations at all
  #      (silent no-op). Fixed in 0.2.9.
  #   2. Standard Ingress template would auto-emit
  #      traefik.ingress.kubernetes.io/router.entrypoints even when the
  #      operator had already set the same key in ingress.annotations,
  #      producing duplicate annotation keys in the rendered YAML (ugly
  #      and last-write-wins). Fixed in 0.2.9 via hasKey-suppression.

  - it: standard Ingress propagates arbitrary user annotations (api)
    template: ingress.yaml
    values:
      - ../ci/ingress-standard-values.yaml
    set:
      ingress.annotations:
        cert-manager.io/cluster-issuer: letsencrypt-prod
        my.custom.example.com/foo: bar
    documentIndex: 0
    asserts:
      - equal:
          path: metadata.annotations["cert-manager.io/cluster-issuer"]
          value: letsencrypt-prod
      - equal:
          path: metadata.annotations["my.custom.example.com/foo"]
          value: bar
      # Chart-auto-emitted annotation still present alongside user's
      - equal:
          path: metadata.annotations["traefik.ingress.kubernetes.io/router.middlewares"]
          value: onyx-ai-onyx-ai-strip-api-prefix@kubernetescrd

  - it: standard Ingress does NOT duplicate router.entrypoints when user sets it
    template: ingress.yaml
    values:
      - ../ci/ingress-standard-values.yaml
    set:
      ingress.annotations:
        traefik.ingress.kubernetes.io/router.entrypoints: websecure
    documentIndex: 0
    asserts:
      - equal:
          path: metadata.annotations["traefik.ingress.kubernetes.io/router.entrypoints"]
          value: websecure
      # Negative: no duplicate key rendered. We can't directly assert
      # "this key appears exactly once" in helm-unittest, so we assert on
      # the rendered YAML structure via documentIndex equality and trust
      # YAML parser dedup. The real coverage is the helm template grep
      # verification run separately.

  - it: standard Ingress user-supplied router.middlewares wins over auto-emit
    template: ingress.yaml
    values:
      - ../ci/ingress-standard-values.yaml
    set:
      ingress.annotations:
        traefik.ingress.kubernetes.io/router.middlewares: myns-custom-chain@kubernetescrd
    documentIndex: 0
    asserts:
      - equal:
          path: metadata.annotations["traefik.ingress.kubernetes.io/router.middlewares"]
          value: myns-custom-chain@kubernetescrd

  - it: standard Ingress auto-emits router.middlewares when user does NOT set it
    template: ingress.yaml
    values:
      - ../ci/ingress-standard-values.yaml
    documentIndex: 0
    asserts:
      - equal:
          path: metadata.annotations["traefik.ingress.kubernetes.io/router.middlewares"]
          value: onyx-ai-onyx-ai-strip-api-prefix@kubernetescrd

  - it: IngressRoute propagates user annotations (main route)
    template: traefik-ingressroute.yaml
    values:
      - ../ci/ingress-values.yaml
    set:
      ingress.annotations:
        example.com/owner: platform-team
        kubernetes.io/description: onyx-ai
    documentIndex: 0
    asserts:
      - equal:
          path: kind
          value: IngressRoute
      - equal:
          path: metadata.annotations["example.com/owner"]
          value: platform-team
      - equal:
          path: metadata.annotations["kubernetes.io/description"]
          value: onyx-ai

  - it: IngressRoute HTTP-redirect variant also propagates user annotations
    template: traefik-ingressroute.yaml
    values:
      - ../ci/ingress-values.yaml
    set:
      ingress.annotations:
        example.com/owner: platform-team
    documentIndex: 1
    asserts:
      - equal:
          path: metadata.name
          value: onyx-ai-ingress-http
      - equal:
          path: metadata.annotations["example.com/owner"]
          value: platform-team

  - it: IngressRoute has NO annotations block when ingress.annotations is unset
    template: traefik-ingressroute.yaml
    values:
      - ../ci/ingress-values.yaml
    documentIndex: 0
    asserts:
      - equal:
          path: kind
          value: IngressRoute
      - notExists:
          path: metadata.annotations
