suite: External Secrets Operator integration
templates:
  - external-secret-garage.yaml
  - external-secret-valkey.yaml
  - garage-credentials-secret.yaml
release:
  name: onyx-ai
  namespace: onyx-ai
chart:
  appVersion: v3.0.1

# NOTE: helm-unittest renders ALL templates listed in the suite's `templates:`
# field for every test. The per-test `template:` field only restricts which
# template the asserts run against. So tests that enable ESO must provide
# enough values for BOTH garage and valkey templates to render without
# erroring, or explicitly disable the per-secret toggle for the template
# we don't care about.

tests:
  # ----------------------------------------------------------------------------
  # Default behavior: ESO disabled, lookup-based garage secret renders
  # ----------------------------------------------------------------------------
  - it: does not render garage ExternalSecret by default
    template: external-secret-garage.yaml
    asserts:
      - hasDocuments:
          count: 0

  - it: does not render valkey ExternalSecret by default
    template: external-secret-valkey.yaml
    asserts:
      - hasDocuments:
          count: 0

  - it: renders the lookup-based garage Secret by default
    template: garage-credentials-secret.yaml
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Secret
      - equal:
          path: metadata.name
          value: onyx-ai-garage-credentials

  # ----------------------------------------------------------------------------
  # ESO enabled but per-secret toggle off => no ExternalSecret for that secret
  # ----------------------------------------------------------------------------
  - it: skips garage ExternalSecret when externalSecrets.garage.enabled is false
    template: external-secret-garage.yaml
    set:
      externalSecrets.enabled: true
      externalSecrets.secretStoreRefName: my-store
      externalSecrets.garage.enabled: false
      externalSecrets.valkey.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: skips valkey ExternalSecret when externalSecrets.valkey.enabled is false
    template: external-secret-valkey.yaml
    set:
      externalSecrets.enabled: true
      externalSecrets.secretStoreRefName: my-store
      externalSecrets.garage.enabled: false
      externalSecrets.valkey.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  # ----------------------------------------------------------------------------
  # ESO enabled with full config => ExternalSecret renders correctly
  # ----------------------------------------------------------------------------
  - it: renders garage ExternalSecret when fully configured
    template: external-secret-garage.yaml
    set:
      externalSecrets.enabled: true
      externalSecrets.secretStoreRefName: my-vault-store
      externalSecrets.refreshInterval: "30m"
      externalSecrets.garage.remoteRefs.s3_aws_access_key_id.key: secret/data/onyx-ai/garage
      externalSecrets.garage.remoteRefs.s3_aws_access_key_id.property: accessKey
      externalSecrets.garage.remoteRefs.s3_aws_secret_access_key.key: secret/data/onyx-ai/garage
      externalSecrets.garage.remoteRefs.s3_aws_secret_access_key.property: secretKey
      externalSecrets.garage.remoteRefs.garage_access_key_id.key: secret/data/onyx-ai/garage
      externalSecrets.garage.remoteRefs.garage_access_key_id.property: accessKey
      externalSecrets.garage.remoteRefs.garage_secret_access_key.key: secret/data/onyx-ai/garage
      externalSecrets.garage.remoteRefs.garage_secret_access_key.property: secretKey
      externalSecrets.valkey.remoteRefs.default-password.key: secret/data/onyx-ai/valkey
      externalSecrets.valkey.remoteRefs.default-password.property: password
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: ExternalSecret
      - equal:
          path: metadata.name
          value: onyx-ai-garage-credentials
      - equal:
          path: metadata.annotations["argocd.argoproj.io/sync-wave"]
          value: "-1"
      - equal:
          path: spec.refreshInterval
          value: "30m"
      - equal:
          path: spec.secretStoreRef.kind
          value: ClusterSecretStore
      - equal:
          path: spec.secretStoreRef.name
          value: my-vault-store
      - equal:
          path: spec.target.name
          value: onyx-ai-garage-credentials
      - equal:
          path: spec.target.creationPolicy
          value: Owner
      - equal:
          path: spec.data[0].secretKey
          value: s3_aws_access_key_id
      - equal:
          path: spec.data[0].remoteRef.key
          value: secret/data/onyx-ai/garage
      - equal:
          path: spec.data[0].remoteRef.property
          value: accessKey
      - lengthEqual:
          path: spec.data
          count: 4

  - it: renders valkey ExternalSecret when fully configured
    template: external-secret-valkey.yaml
    set:
      externalSecrets.enabled: true
      externalSecrets.secretStoreRefName: my-vault-store
      externalSecrets.garage.remoteRefs.s3_aws_access_key_id.key: p
      externalSecrets.garage.remoteRefs.s3_aws_secret_access_key.key: p
      externalSecrets.garage.remoteRefs.garage_access_key_id.key: p
      externalSecrets.garage.remoteRefs.garage_secret_access_key.key: p
      externalSecrets.valkey.remoteRefs.default-password.key: secret/data/onyx-ai/valkey
      externalSecrets.valkey.remoteRefs.default-password.property: password
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: ExternalSecret
      - equal:
          path: metadata.name
          value: onyx-ai-valkey-credentials
      - equal:
          path: spec.target.name
          value: onyx-ai-valkey-credentials
      - equal:
          path: spec.data[0].secretKey
          value: default-password
      - equal:
          path: spec.data[0].remoteRef.key
          value: secret/data/onyx-ai/valkey
      - equal:
          path: spec.data[0].remoteRef.property
          value: password

  # ----------------------------------------------------------------------------
  # Skip-guard on the lookup-based garage secret
  # ----------------------------------------------------------------------------
  - it: skips lookup-based garage Secret when ESO manages garage
    template: garage-credentials-secret.yaml
    set:
      externalSecrets.enabled: true
      externalSecrets.secretStoreRefName: my-store
      externalSecrets.garage.enabled: true
      externalSecrets.garage.remoteRefs.s3_aws_access_key_id.key: p
      externalSecrets.garage.remoteRefs.s3_aws_secret_access_key.key: p
      externalSecrets.garage.remoteRefs.garage_access_key_id.key: p
      externalSecrets.garage.remoteRefs.garage_secret_access_key.key: p
      externalSecrets.valkey.remoteRefs.default-password.key: p
    asserts:
      - hasDocuments:
          count: 0

  - it: keeps rendering lookup-based garage Secret when only valkey is ESO-managed
    template: garage-credentials-secret.yaml
    set:
      externalSecrets.enabled: true
      externalSecrets.secretStoreRefName: my-store
      externalSecrets.garage.enabled: false
      externalSecrets.valkey.enabled: true
      externalSecrets.valkey.remoteRefs.default-password.key: p
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Secret

  # ----------------------------------------------------------------------------
  # SecretStore kind variations
  # ----------------------------------------------------------------------------
  - it: supports namespaced SecretStore kind
    template: external-secret-garage.yaml
    set:
      externalSecrets.enabled: true
      externalSecrets.secretStoreRefKind: SecretStore
      externalSecrets.secretStoreRefName: my-namespaced-store
      externalSecrets.garage.remoteRefs.s3_aws_access_key_id.key: p
      externalSecrets.garage.remoteRefs.s3_aws_secret_access_key.key: p
      externalSecrets.garage.remoteRefs.garage_access_key_id.key: p
      externalSecrets.garage.remoteRefs.garage_secret_access_key.key: p
      externalSecrets.valkey.remoteRefs.default-password.key: p
    asserts:
      - equal:
          path: spec.secretStoreRef.kind
          value: SecretStore

  # ----------------------------------------------------------------------------
  # Validation failures
  # ----------------------------------------------------------------------------
  - it: fails validation when secretStoreRefName is empty
    template: external-secret-garage.yaml
    set:
      externalSecrets.enabled: true
      externalSecrets.valkey.enabled: false
      externalSecrets.garage.remoteRefs.s3_aws_access_key_id.key: p
      externalSecrets.garage.remoteRefs.s3_aws_secret_access_key.key: p
      externalSecrets.garage.remoteRefs.garage_access_key_id.key: p
      externalSecrets.garage.remoteRefs.garage_secret_access_key.key: p
    asserts:
      - failedTemplate:
          errorMessage: "externalSecrets.secretStoreRefName is required when externalSecrets.enabled is true"

  - it: fails validation when a garage remoteRef key is missing
    template: external-secret-garage.yaml
    set:
      externalSecrets.enabled: true
      externalSecrets.secretStoreRefName: my-store
      externalSecrets.garage.remoteRefs.s3_aws_secret_access_key.key: p
      externalSecrets.garage.remoteRefs.garage_access_key_id.key: p
      externalSecrets.garage.remoteRefs.garage_secret_access_key.key: p
      externalSecrets.valkey.remoteRefs.default-password.key: p
    asserts:
      - failedTemplate:
          errorMessage: "externalSecrets.garage.remoteRefs.s3_aws_access_key_id.key is required when externalSecrets.garage.enabled is true"

  - it: fails validation when valkey remoteRef key is missing
    template: external-secret-valkey.yaml
    set:
      externalSecrets.enabled: true
      externalSecrets.secretStoreRefName: my-store
      externalSecrets.garage.enabled: false
    asserts:
      - failedTemplate:
          errorMessage: "externalSecrets.valkey.remoteRefs.default-password.key is required when externalSecrets.valkey.enabled is true"
