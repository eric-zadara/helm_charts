apiVersion: v2
name: model-serving
description: "Multi-runtime model serving: vLLM (GPU), llama.cpp (CPU), and Ollama (GPU/CPU) ServingRuntimes with InferenceService templates for LLM inference"
type: application
version: 0.2.0
appVersion: "0.16.0"
home: https://github.com/eric-zadara/helm_charts
sources:
  - https://github.com/eric-zadara/helm_charts
maintainers:
  - name: eric-zadara
    url: https://github.com/eric-zadara
annotations:
  testing/tier: "2"
  testing/prerequisites: "tier1-crds"

# Dependencies (must be installed before this chart):
