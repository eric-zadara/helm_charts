apiVersion: v2
name: inference-infrastructure
description: Infrastructure layer for LLM inference platform - KServe, networking, and API proxy
type: application
version: 0.11.0
appVersion: "1.0.0"
annotations:
  testing/tier: "3"
  testing/prerequisites: "inference-crds,inference-operators"
  testing/timeout: "15m"

dependencies:
  - name: kserve
    version: "v0.16.0"
    repository: "oci://ghcr.io/kserve/charts"
    condition: kserve.enabled
  - name: litellm-proxy
    version: "0.2.5"
    repository: "https://eric-zadara.github.io/helm_charts/"
    condition: litellm-proxy.enabled
