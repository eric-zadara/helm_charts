apiVersion: v2
name: inference-infrastructure
description: Infrastructure layer for LLM inference platform - KServe (Standard mode), networking, and API proxy
type: application
version: 0.12.0
appVersion: "1.0.0"
home: https://github.com/eric-zadara/helm_charts
sources:
  - https://github.com/eric-zadara/helm_charts
maintainers:
  - name: eric-zadara
    url: https://github.com/eric-zadara
annotations:
  testing/tier: "3"
  testing/prerequisites: "inference-crds"
  testing/timeout: "15m"

dependencies:
  - name: kserve
    version: "v0.16.0"
    repository: "oci://ghcr.io/kserve/charts"
    condition: kserve.enabled
  - name: litellm-proxy
    version: "0.2.5"
    repository: "https://eric-zadara.github.io/helm_charts/"
    condition: litellm-proxy.enabled
