{{- if .Values.knativeServing.enabled }}
{{- $hookName := printf "%s-restart-kserve" .Release.Name }}
# Post-install hook: restart KServe controller after KnativeServing is ready.
#
# KServe (installed by inference-operators) caches a terminal "Knative not available"
# error if Knative Serving isn't ready at first reconciliation. Since KnativeServing CR
# lives in this chart (installed after inference-operators), KServe needs a restart
# once Knative Serving is fully reconciled.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $hookName }}
  annotations:
    helm.sh/hook: post-install
    helm.sh/hook-delete-policy: hook-succeeded,before-hook-creation
    helm.sh/hook-weight: "0"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ $hookName }}
  annotations:
    helm.sh/hook: post-install
    helm.sh/hook-delete-policy: hook-succeeded,before-hook-creation
    helm.sh/hook-weight: "0"
rules:
  # Watch KnativeServing status
  - apiGroups: ["operator.knative.dev"]
    resources: ["knativeservings"]
    verbs: ["get", "list", "watch"]
  # Restart KServe controller
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ $hookName }}
  annotations:
    helm.sh/hook: post-install
    helm.sh/hook-delete-policy: hook-succeeded,before-hook-creation
    helm.sh/hook-weight: "0"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ $hookName }}
subjects:
  - kind: ServiceAccount
    name: {{ $hookName }}
    namespace: {{ .Release.Namespace }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ $hookName }}
  annotations:
    helm.sh/hook: post-install
    helm.sh/hook-delete-policy: hook-succeeded,before-hook-creation
    helm.sh/hook-weight: "5"
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 300
  template:
    spec:
      serviceAccountName: {{ $hookName }}
      restartPolicy: OnFailure
      containers:
        - name: restart-kserve
          image: {{ .Values.knativeServing.restartHook.image | default "bitnami/kubectl:1.31" }}
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              NAMESPACE="{{ .Values.knativeServing.restartHook.kserveNamespace | default "inference-operators" }}"
              DEPLOYMENT="{{ .Values.knativeServing.restartHook.kserveDeployment | default "kserve-controller-manager" }}"

              echo "Waiting for KnativeServing to be ready..."
              kubectl wait knativeserving/knative-serving \
                -n {{ .Values.knativeServing.namespace | default "knative-serving" }} \
                --for=condition=Ready --timeout=300s

              echo "KnativeServing is ready. Restarting KServe controller..."
              kubectl rollout restart "deployment/$DEPLOYMENT" -n "$NAMESPACE"
              kubectl rollout status "deployment/$DEPLOYMENT" -n "$NAMESPACE" --timeout=120s

              echo "KServe controller restarted successfully."
{{- end }}
