suite: ServiceAccount template
templates:
  - serviceaccount.yaml
tests:
  - it: should create a ServiceAccount by default
    asserts:
      - isKind:
          of: ServiceAccount

  - it: should disable token automounting
    asserts:
      - equal:
          path: automountServiceAccountToken
          value: false

  - it: should not render when create is false
    set:
      serviceAccount.create: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should include annotations
    set:
      serviceAccount.annotations:
        test-annotation: test-value
    asserts:
      - equal:
          path: metadata.annotations.test-annotation
          value: test-value
