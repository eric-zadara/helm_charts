suite: ServiceMonitor template
templates:
  - servicemonitor.yaml
tests:
  - it: should not render by default
    asserts:
      - hasDocuments:
          count: 0

  - it: should render when enabled
    set:
      serviceMonitor.enabled: true
    asserts:
      - isKind:
          of: ServiceMonitor
      - equal:
          path: spec.endpoints[0].interval
          value: 30s
      - equal:
          path: spec.endpoints[0].path
          value: /metrics

  - it: should include custom labels
    set:
      serviceMonitor.enabled: true
      serviceMonitor.labels:
        release: prometheus
    asserts:
      - equal:
          path: metadata.labels.release
          value: prometheus
