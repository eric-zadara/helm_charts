# CI values: exercises model credential injection (existingSecret + secretKeys)
replicaCount: 1
persistentVolume:
  enabled: false
server:
  warmup: false
startupProbe:
  enabled: false
livenessProbe:
  enabled: false
readinessProbe:
  enabled: false
model:
  source: hf
  hf:
    repo: "test-org/test-model-gguf"
    file: "test-model-q4.gguf"
  preload: true
  credentials:
    existingSecret: "ci-test-credentials"
    secretKeys:
      HF_TOKEN: "token"
      AWS_ACCESS_KEY_ID: "access-key"
      AWS_SECRET_ACCESS_KEY: "secret-key"
